<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hispren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
:root{
  --violet:#6D4AFF; --violet-dk:#5B3FD9; --violet-soft:#EDE9FE; --violet-wash:#F7F5FF;
  --mint:#2DD4BF; --mint-dk:#0F766E; --mint-soft:#F0FDFA;
  --coral:#FB7185; --coral-dk:#BE3455; --coral-soft:#FFE4E6;
  --amber:#FB923C;
  --page:#FAFAFC; --card:#FFFFFF; --line:#F0F0F5; --line2:#F5F5F9;
  --text:#1F2033; --muted:#9195A8; --chip:#F1F1F6; --chip-tx:#6B7080;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--page);
  color:var(--text);font-size:14px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none}
input,select{font-family:inherit;font-size:13px;padding:10px 12px;border:1px solid var(--line);
  border-radius:10px;width:100%;background:#fff;color:var(--text)}
input:focus,select:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-soft)}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.field{margin-bottom:14px}
.btn{background:var(--violet);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:12px}
.btn:hover{background:var(--violet-dk)}
.btn-o{background:#fff;color:var(--text);border:1px solid var(--line);font-weight:500}
.btn-o:hover{background:var(--violet-wash);border-color:var(--violet-soft)}
.pill{font-size:12px;padding:4px 10px;border-radius:8px;display:inline-block;white-space:nowrap;font-weight:500}
.p-v{background:var(--violet-soft);color:var(--violet-dk)}
.p-m{background:var(--mint-soft);color:var(--mint-dk)}
.p-c{background:var(--coral-soft);color:var(--coral-dk)}
.p-g{background:var(--chip);color:var(--chip-tx)}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
.ch{display:flex;align-items:center;gap:7px;margin-bottom:13px}
.ch i{font-size:16px;color:var(--violet)}
.ch b{font-size:13px;font-weight:600}
.muted{color:var(--muted);font-size:12px}
.av{width:32px;height:32px;border-radius:50%;background:var(--violet-soft);color:var(--violet-dk);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.grad{background:linear-gradient(90deg,var(--mint),var(--violet));-webkit-background-clip:text;
  background-clip:text;color:transparent}
.err{background:var(--coral-soft);color:var(--coral-dk);padding:10px 13px;border-radius:10px;font-size:12px;margin-bottom:14px}

#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
#login .box{background:#fff;border:1px solid var(--line);border-radius:24px;padding:36px;width:100%;max-width:400px}
.mark{width:38px;height:38px;border-radius:12px;background:var(--violet);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700}

#app{display:none;padding:16px;min-height:100vh}
.wrap{display:flex;gap:16px;max-width:1240px;margin:0 auto}
.side{width:196px;flex-shrink:0}
.prof{background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;
  display:flex;align-items:center;gap:9px;margin-bottom:18px}
.nav{display:flex;align-items:center;gap:11px;padding:9px 12px;border-radius:11px;
  color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:2px;font-weight:500}
.nav i{font-size:17px}
.nav:hover{background:var(--violet-wash);color:var(--text)}
.nav.on{background:var(--violet-soft);color:var(--violet-dk)}
.n{margin-left:auto;font-size:11px;background:var(--coral);color:#fff;
  padding:1px 7px;border-radius:8px;font-weight:600}
.sec{display:flex;align-items:center;justify-content:space-between;padding:18px 12px 8px}
.sec span{font-size:12px;color:var(--muted);font-weight:500}
.dotrow{display:flex;align-items:center;gap:10px;padding:6px 12px;font-size:13px;cursor:pointer;border-radius:9px}
.dotrow:hover{background:var(--violet-wash)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.promo{background:var(--violet);border-radius:16px;padding:14px;margin-top:20px}
.main{flex:1;min-width:0}
.hi{font-size:24px;font-weight:600;line-height:1.3}
.acts{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 18px}
.act{border:1px solid var(--line);background:#fff;color:var(--text);font-size:12px;font-weight:500;
  padding:9px 15px;border-radius:22px;display:flex;align-items:center;gap:6px}
.act:hover{background:var(--violet-wash);border-color:var(--violet-soft)}
.act.v{background:var(--violet);color:#fff;border-color:var(--violet)}
.act.v:hover{background:var(--violet-dk)}
.g2{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,1fr);gap:14px}
.col{display:flex;flex-direction:column;gap:14px}
.bar{height:6px;background:var(--chip);border-radius:4px;overflow:hidden}
.bar>div{height:6px;border-radius:4px}
.svc{flex:1;background:var(--violet-wash);border-radius:12px;padding:10px;text-align:center}
.svc.on{background:var(--violet)}
.svc.on .l{color:#D6CCFF} .svc.on .v{color:#fff}
.svc .l{font-size:12px;color:var(--muted)} .svc .v{font-size:17px;font-weight:600}

table{width:100%;border-collapse:collapse}
th{font-size:12px;color:var(--muted);font-weight:500;text-align:left;padding:0 12px 10px}
td{padding:11px 12px;border-top:1px solid var(--line2);font-size:13px;vertical-align:middle}
tbody tr{cursor:pointer}
tbody tr:hover{background:var(--violet-wash)}
tr.dupe{background:var(--coral-soft)}

.mbg{position:fixed;inset:0;background:rgba(31,32,51,.35);backdrop-filter:blur(3px);
  display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:9}
.modal{background:#fff;border-radius:22px;padding:26px;width:100%;max-width:660px}
.sect{font-size:12px;color:var(--muted);font-weight:600;margin:20px 0 12px;
  padding-bottom:7px;border-bottom:1px solid var(--line)}
.sect:first-of-type{margin-top:0}
.row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.gg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:820px){.wrap{flex-direction:column}.side{width:100%}.g2,.g3,.gg2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div style="display:flex;align-items:center;gap:11px">
      <div class="mark">H</div>
      <div style="font-size:19px;font-weight:700">Hispren</div>
    </div>
    <div class="hi" style="font-size:19px;margin:20px 0 2px">Welcome back</div>
    <div class="hi grad" style="font-size:19px;margin-bottom:24px">Let's look after your church.</div>
    <div id="lerr"></div>
    <div class="field"><label>Church</label><input id="church" value="dominion" autocomplete="off"></div>
    <div class="field"><label>Email</label><input id="email" type="email" value="pastor@dominion.test" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="pw" type="password" value="DominionPastor2026" autocomplete="current-password"></div>
    <button class="btn" style="width:100%;margin-top:6px" onclick="doLogin()">Sign in</button>
  </div>
</div>

<div id="app">
 <div class="wrap">
  <div class="side">
    <div class="prof">
      <div class="av" id="pAv">—</div>
      <div style="min-width:0">
        <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="pName">—</div>
        <div style="font-size:11px;color:var(--mint);font-weight:500">Online</div>
      </div>
    </div>
    <div class="nav on" data-v="home"       onclick="go('home')"><i class="ti ti-home"></i>Home</div>
    <div class="nav"    data-v="members"    onclick="go('members')"><i class="ti ti-users"></i>Members</div>
    <div class="nav"    data-v="duplicates" onclick="go('duplicates')"><i class="ti ti-copy"></i>Duplicates<span id="dBadge"></span></div>
    <div class="nav"    data-v="import"     onclick="go('import')"><i class="ti ti-upload"></i>Bulk import</div>
    <div class="sec"><span>My church</span></div>
    <div id="groups"></div>
    <div class="promo">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px">
        <i class="ti ti-device-mobile" style="font-size:14px;color:#fff"></i>
        <span style="font-size:12px;color:#fff;font-weight:600">hispren</span>
      </div>
      <div style="font-size:12px;color:#D6CCFF;line-height:1.55;margin-bottom:12px">
        Members with the app never miss an announcement.</div>
      <button style="background:#fff;color:var(--violet-dk);font-size:12px;font-weight:600;
        padding:7px 11px;border-radius:10px;width:100%">+ Invite members</button>
    </div>
    <div class="nav" style="margin-top:14px" onclick="logout()"><i class="ti ti-logout"></i>Sign out</div>
  </div>

  <div class="main">
    <div class="muted" id="today">—</div>
    <div class="hi" id="hi">—</div>
    <div class="hi grad">How is the church doing today?</div>
    <div class="acts">
      <button class="act v" onclick="alert('Hispren AI arrives in Phase 2 — it needs the automation engine underneath it first.')">
        <i class="ti ti-sparkles"></i>Ask Hispren</button>
      <button class="act" onclick="openForm()"><i class="ti ti-user-plus"></i>Register a member</button>
      <button class="act" onclick="go('import')"><i class="ti ti-upload"></i>Import a spreadsheet</button>
      <button class="act" onclick="go('duplicates')"><i class="ti ti-copy"></i>Review duplicates</button>
    </div>
    <div id="view"></div>
  </div>
 </div>
</div>
<div id="modal"></div>

<script>
let CHURCH='', ME=null, DUPES=[], MEMBERS=[];
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ini=n=>(n||'?').split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase();

async function api(p,o={}){
  const r=await fetch(p,{...o,headers:{'Content-Type':'application/json','X-Church':CHURCH,...(o.headers||{})},credentials:'include'});
  if(r.status===401){logout();throw new Error('signed out')}
  const b=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(b.detail||b.error||'request failed');
  return b;
}
async function doLogin(){
  CHURCH=$('#church').value.trim().toLowerCase(); $('#lerr').innerHTML='';
  try{
    await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:$('#email').value.trim(),password:$('#pw').value})});
    sessionStorage.setItem('church',CHURCH); await boot();
  }catch(e){ $('#lerr').innerHTML=`<div class="err">${esc(e.message)}</div>`; }
}
function logout(){
  fetch('/api/auth/logout',{method:'POST',headers:{'X-Church':CHURCH},credentials:'include'}).catch(()=>{});
  sessionStorage.clear(); $('#app').style.display='none'; $('#login').style.display='flex';
}

async function boot(){
  ME=await api('/api/me');
  $('#login').style.display='none'; $('#app').style.display='block';
  $('#pName').textContent=ME.tenant.name; $('#pAv').textContent=ini(ME.tenant.name);
  $('#today').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long'});
  $('#hi').textContent='Hello there';
  MEMBERS=(await api('/api/members?limit=200')).members;
  DUPES=await api('/api/duplicates').catch(()=>[]);
  $('#dBadge').outerHTML=DUPES.length?`<span class="n" id="dBadge">${DUPES.length}</span>`:'<span id="dBadge"></span>';
  const gs=[...new Set(MEMBERS.map(m=>m.home_group_name).filter(Boolean))];
  const cols=['var(--violet)','var(--mint)','var(--coral)','var(--amber)'];
  $('#groups').innerHTML=gs.map((g,i)=>`<div class="dotrow" onclick="go('members')">
    <span class="dot" style="background:${cols[i%4]}"></span>${esc(g)}</div>`).join('')
    ||'<div class="muted" style="padding:6px 12px">No groups yet</div>';
  go('home');
}
function go(v){
  document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('on',n.dataset.v===v));
  ({home:viewHome,members:viewMembers,duplicates:viewDupes,import:viewImport})[v]();
}

function viewHome(){
  const t=MEMBERS.length;
  const ft=MEMBERS.filter(m=>m.stage_key==='first_timer'||m.stage_key==='visitor');
  const noc=MEMBERS.filter(m=>!m.phone&&!m.phone_2&&!m.email).length;
  const pct=t?Math.round((t-noc)/t*100):0;
  const svc=k=>MEMBERS.filter(m=>m.usual_service===k).length;
  const s1=svc('1st Service'),s2=svc('2nd Service'),s3=svc('3rd Service');
  const top=Math.max(s1,s2,s3);
  $('#view').innerHTML=`<div class="g2">
   <div class="col">
     <div class="card">
       <div class="ch"><i class="ti ti-checkbox"></i><b>Needs a call</b></div>
       ${ft.length?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:11px">
          <span class="pill p-v">TO CALL</span><span class="muted">${ft.length} ${ft.length===1?'person':'people'}</span></div>`:''}
       ${ft.slice(0,4).map(m=>`
         <div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;
              border-bottom:1px solid var(--line2);cursor:pointer" onclick="openMember('${m.id}')">
           <div style="min-width:0">
             <div style="font-size:13px">${esc(m.full_name)}</div>
             <div class="muted">${esc(m.stage_label)} · ${esc(m.home_group_name||'no group')}</div>
           </div>
           <span class="pill ${m.phone?'p-c':'p-g'}">${m.phone?'Call':'No phone'}</span>
         </div>`).join('')||'<div class="muted">Nobody waiting. Good.</div>'}
     </div>
     <div class="card">
       <div class="ch"><i class="ti ti-target-arrow"></i><b>Data health</b></div>
       <div style="margin-bottom:14px">
         <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
           <div><div style="font-size:13px">Members we can reach</div>
             <div class="muted">${t-noc} of ${t} have a phone or email</div></div>
           <b style="font-size:13px">${pct}%</b></div>
         <div class="bar"><div style="width:${pct}%;background:var(--mint)"></div></div>
       </div>
       <div>
         <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
           <div><div style="font-size:13px">Records needing review</div>
             <div class="muted">${DUPES.length} possible duplicate${DUPES.length===1?'':'s'}</div></div>
           <b style="font-size:13px">${DUPES.length}</b></div>
         <div class="bar"><div style="width:${t&&DUPES.length?Math.min(100,DUPES.length/t*800):0}%;background:var(--coral)"></div></div>
       </div>
     </div>
   </div>
   <div class="col">
     <div class="card">
       <div class="ch" style="justify-content:space-between">
         <div style="display:flex;align-items:center;gap:7px"><i class="ti ti-building-church"></i><b>By service</b></div>
         <span class="muted">${t} members</span></div>
       <div style="display:flex;gap:8px">
         <div class="svc ${top&&s1===top?'on':''}"><div class="l">1st</div><div class="v">${s1}</div></div>
         <div class="svc ${top&&s2===top?'on':''}"><div class="l">2nd</div><div class="v">${s2}</div></div>
         <div class="svc ${top&&s3===top?'on':''}"><div class="l">3rd</div><div class="v">${s3}</div></div>
         <div class="svc" style="background:var(--mint-soft)">
           <div class="l" style="color:var(--mint-dk)">New</div>
           <div class="v" style="color:var(--mint-dk)">${ft.length}</div></div>
       </div>
       <div class="muted" style="margin-top:11px">A single number hides which service is growing.</div>
     </div>
     <div class="card">
       <div class="ch"><i class="ti ti-bell"></i><b>Needs attention</b></div>
       ${DUPES.length?`<div style="display:flex;align-items:center;gap:9px;padding:7px 0;cursor:pointer" onclick="go('duplicates')">
         <span class="dot" style="background:var(--coral)"></span>
         <span style="font-size:13px;flex:1">${DUPES.length} possible duplicate member${DUPES.length===1?'':'s'}</span>
         <i class="ti ti-chevron-right" style="color:var(--muted)"></i></div>`:''}
       ${noc?`<div style="display:flex;align-items:center;gap:9px;padding:7px 0">
         <span class="dot" style="background:var(--amber)"></span>
         <span style="font-size:13px;flex:1">${noc} member${noc===1?'':'s'} we cannot contact</span></div>`:''}
       ${!DUPES.length&&!noc?'<div class="muted">Nothing to worry about.</div>':''}
     </div>
   </div>
  </div>`;
}

async function viewMembers(q=''){
  const d=await api('/api/members?limit=200'+(q?'&q='+encodeURIComponent(q):''));
  const flagged=new Set(DUPES.flatMap(x=>[x.person_a.id,x.person_b.id]));
  $('#view').innerHTML=`<div class="card">
     <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:10px;flex-wrap:wrap">
       <div class="ch" style="margin:0"><i class="ti ti-users"></i><b>Members</b>
         <span class="muted" style="margin-left:6px">${d.total}</span></div>
       <div style="display:flex;gap:8px">
         <input id="q" value="${esc(q)}" placeholder="Search name, phone, code" style="width:220px">
         <button class="btn" style="white-space:nowrap" onclick="openForm()">+ Register</button>
       </div>
     </div>
     <table><thead><tr><th>Member</th><th>Phone</th><th>Stage</th><th>Group</th><th>Service</th></tr></thead>
     <tbody>${d.members.map(m=>`<tr class="${flagged.has(m.id)?'dupe':''}" onclick="openMember('${m.id}')">
       <td><div style="display:flex;align-items:center;gap:11px">
         <div class="av">${ini(m.full_name)}</div>
         <div><div style="font-weight:500">${esc(m.full_name)}</div>
         ${flagged.has(m.id)?'<div class="muted" style="color:var(--coral-dk)">Possible duplicate</div>':''}</div>
       </div></td>
       <td class="muted">${esc(m.phone||m.phone_2||'—')}</td>
       <td><span class="pill ${m.stage_key==='first_timer'?'p-m':m.stage_key==='visitor'?'p-c':'p-v'}">${esc(m.stage_label||'—')}</span></td>
       <td class="muted">${esc(m.home_group_name||'—')}</td>
       <td class="muted">${esc((m.usual_service||'—').replace(' Service',''))}</td>
     </tr>`).join('')||'<tr><td colspan="5" class="muted">No members found.</td></tr>'}
     </tbody></table></div>`;
  const b=$('#q'); b.oninput=e=>{clearTimeout(window._t);window._t=setTimeout(()=>viewMembers(e.target.value),300)};
  b.focus(); b.setSelectionRange(b.value.length,b.value.length);
}

async function openMember(id){
  const m=await api('/api/members/'+id);
  const qr=await api(`/api/members/${id}/qr`).catch(()=>null);
  let h=null; try{h=await api(`/api/members/${id}/health`)}catch{}
  const f=(l,v)=>v?`<div class="row"><span class="muted">${l}</span><span>${esc(v)}</span></div>`:'';
  const carrier=h&&['AS','SS','AC','SC'].includes(h.genotype);
  $('#modal').innerHTML=`<div class="mbg" onclick="if(event.target===this)close_()"><div class="modal">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div class="av" style="width:52px;height:52px;font-size:17px">${ini(m.full_name)}</div>
      <div style="flex:1"><div style="font-size:19px;font-weight:600">${esc(m.full_name)}</div>
        <div class="muted">${esc(m.stage_label||'')} · ${esc(m.home_group_name||'no group')}</div></div>
      <span class="pill p-g">${esc(m.source||'')}</span>
    </div>
    <div class="sect">CONTACT</div>
    ${f('Phone',m.phone)}${f('Second phone',m.phone_2)}${f('Email',m.email)}
    ${f('Address',m.address)}${f('Town',m.town)}${f('LGA',m.lga)}
    <div class="sect">ORIGIN</div>
    ${f('State of origin',m.state_of_origin)}${f('LGA of origin',m.lga_of_origin)}
    ${f('Date of birth',(m.date_of_birth||'').slice(0,10))}${f('Gender',m.gender)}${f('Marital status',m.marital_status)}
    <div class="sect">CHURCH</div>
    ${f('Service',m.usual_service)}${f('Post held',m.post_held)}
    ${f('Work / school',m.occupation)}${f('Place of work',m.workplace)}
    ${h?`<div class="sect">HEALTH — pastor only. This view was logged.</div>
      <div class="row"><span class="muted">Genotype</span>
        <span class="pill ${carrier?'p-c':'p-m'}">${esc(h.genotype||'—')}</span></div>
      ${f('Blood group',h.blood_group)}
      ${carrier?`<div style="background:var(--coral-soft);color:var(--coral-dk);padding:12px 14px;
        border-radius:12px;font-size:12px;line-height:1.65;margin-top:10px">
        Carrier. Flag before marriage counselling — AS x AS carries a 1-in-4 risk of a child
        with sickle cell disease.</div>`:''}`:''}
    ${qr?`<div class="sect">QR IDENTITY</div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <img alt="QR code" width="104" height="104" style="border-radius:12px;border:1px solid var(--line)"
          src="https://api.qrserver.com/v1/create-qr-code/?size=104x104&data=${encodeURIComponent(qr.qr_token)}">
        <div style="flex:1;min-width:200px"><div class="muted" style="line-height:1.65">Scanned at the gate to mark
          attendance. If it leaks, rotate it — no need to reprint an ID card.</div>
          <button class="btn btn-o" style="margin-top:10px" onclick="rot('${id}')">Rotate code</button></div>
      </div>`:''}
    <button class="btn btn-o" style="width:100%;margin-top:24px" onclick="close_()">Close</button>
  </div></div>`;
}
async function rot(id){await api(`/api/members/${id}/qr/rotate`,{method:'POST'});openMember(id)}
function close_(){$('#modal').innerHTML=''}

function openForm(){
  const t=(n,l,ty='text')=>`<div class="field"><label>${l}</label><input id="f_${n}" type="${ty}"></div>`;
  $('#modal').innerHTML=`<div class="mbg" onclick="if(event.target===this)close_()"><div class="modal">
    <div style="font-size:19px;font-weight:600">Register a member</div>
    <div class="muted" style="margin-bottom:20px;line-height:1.65">
      Phone numbers are cleaned automatically. Duplicates are flagged, never merged without you.</div>
    <div id="ferr"></div>
    <div class="sect">NAME</div>
    <div class="g3">${t('first_name','First name')}${t('middle_name','Other name')}${t('last_name','Surname')}</div>
    <div class="sect">CONTACT — most people carry two SIMs</div>
    <div class="gg2">${t('phone','Phone 1')}${t('phone_2','Phone 2')}</div>${t('email','Email','email')}
    <div class="sect">ORIGIN</div>
    <div class="gg2">${t('state_of_origin','State of origin')}${t('lga_of_origin','LGA of origin')}</div>
    <div class="sect">RESIDENCE</div>${t('address','Address')}
    <div class="gg2">${t('town','Town')}${t('lga','LGA')}</div>
    <div class="sect">DETAILS</div>
    <div class="gg2">
      <div class="field"><label>Gender</label><select id="f_gender">
        <option value="">-</option><option value="male">Male</option><option value="female">Female</option></select></div>
      ${t('date_of_birth','Date of birth','date')}
    </div>
    <div class="gg2">${t('occupation','Work / school')}${t('workplace','Place of work / school')}</div>
    <div class="gg2">
      <div class="field"><label>Service</label><select id="f_usual_service">
        <option value="">-</option><option>1st Service</option><option>2nd Service</option><option>3rd Service</option></select></div>
      ${t('post_held','Post held')}
    </div>
    <div style="display:flex;gap:10px;margin-top:24px">
      <button class="btn btn-o" style="flex:1" onclick="close_()">Cancel</button>
      <button class="btn" style="flex:2" onclick="save()">Register member</button>
    </div>
  </div></div>`;
}
async function save(){
  const ks=['first_name','middle_name','last_name','phone','phone_2','email','state_of_origin',
    'lga_of_origin','address','town','lga','gender','date_of_birth','occupation','workplace','usual_service','post_held'];
  const b={source:'manual'}; ks.forEach(k=>{const el=$('#f_'+k); const v=el&&el.value.trim(); if(v)b[k]=v});
  if(!b.first_name){$('#ferr').innerHTML='<div class="err">A first name is required.</div>';return}
  try{ await api('/api/members',{method:'POST',body:JSON.stringify(b)}); close_(); await boot(); go('members'); }
  catch(e){ $('#ferr').innerHTML=`<div class="err">${esc(e.message)}</div>` }
}

async function viewDupes(){
  DUPES=await api('/api/duplicates');
  $('#view').innerHTML=`
   <div class="card" style="margin-bottom:14px">
     <div class="ch"><i class="ti ti-copy"></i><b>Duplicates</b></div>
     <div class="muted" style="line-height:1.75">
       A name alone is never enough — Nigerian names repeat. These records share a phone number,
       an email, or a date of birth. Nothing is merged without you.</div>
   </div>
   ${DUPES.length?DUPES.map(x=>`<div class="card" style="margin-bottom:14px">
     <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;flex-wrap:wrap">
       <div style="display:flex;gap:7px;flex-wrap:wrap">
         ${(x.reasons||[]).map(r=>`<span class="pill p-c">${esc(r)}</span>`).join('')}</div>
       <span class="muted">score ${x.score}</span></div>
     <div class="gg2">
       ${[x.person_a,x.person_b].map((p,i)=>`
         <div style="border:1px solid var(--line);border-radius:14px;padding:14px">
           <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
             <div class="av">${ini(p.name)}</div>
             <div><div style="font-weight:600;font-size:13px">${esc(p.name)}</div>
             <div class="muted">${esc(p.phone||'no phone')}</div></div></div>
           <div class="muted">${esc(p.source||'')} · added ${new Date(p.created_at).toLocaleDateString('en-GB')}</div>
           <button class="btn" style="width:100%;margin-top:12px"
             onclick="mg('${p.id}','${(i?x.person_a:x.person_b).id}')">Keep this one</button>
         </div>`).join('')}
     </div>
     <button class="btn btn-o" style="width:100%;margin-top:12px" onclick="dis('${x.id}')">
       These are different people</button>
   </div>`).join('')
   :'<div class="card muted">Nothing to review.</div>'}`;
}
async function mg(keep,drop){
  if(!confirm('Merge these? The other record is archived - but kept in full in the merge log, forever.'))return;
  await api('/api/duplicates/merge',{method:'POST',body:JSON.stringify({keep_id:keep,merge_id:drop})});
  await boot(); go('duplicates');
}
async function dis(id){ await api(`/api/duplicates/${id}/dismiss`,{method:'POST'}); await boot(); go('duplicates'); }

function viewImport(){
  $('#view').innerHTML=`<div class="card">
    <div class="ch"><i class="ti ti-upload"></i><b>Bulk import</b></div>
    <div class="muted" style="line-height:1.75;margin-bottom:16px">
      Upload a CSV. Columns are matched for you, phone numbers cleaned, dates read in Nigerian
      order. Nothing is written until you say so - and any import can be undone.</div>
    <input type="file" id="csv" accept=".csv"
      style="border:1px dashed var(--line);padding:22px;border-radius:14px;background:var(--violet-wash)">
    <div id="pv" style="margin-top:18px"></div>
  </div>`;
  $('#csv').onchange=async e=>{
    const file=e.target.files[0]; if(!file)return;
    const csv=await file.text(); $('#pv').innerHTML='<div class="muted">Reading…</div>';
    try{
      const p=await api('/api/import/preview',{method:'POST',body:JSON.stringify({filename:file.name,csv})});
      window._i={csv,...p};
      $('#pv').innerHTML=`
        <div style="display:flex;gap:24px;margin-bottom:16px">
          <div><div class="muted">Rows</div><div style="font-size:22px;font-weight:600">${p.total}</div></div>
          <div><div class="muted">Valid</div><div style="font-size:22px;font-weight:600;color:var(--mint-dk)">${p.valid}</div></div>
          <div><div class="muted">Problems</div><div style="font-size:22px;font-weight:600;color:${p.errors?'var(--coral-dk)':'inherit'}">${p.errors}</div></div>
        </div>
        <div class="muted" style="margin-bottom:7px">Columns we matched</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px">
          ${Object.entries(p.column_map).map(([h,f])=>`<span class="pill p-v">${esc(h)} → ${esc(f)}</span>`).join('')}</div>
        ${p.unmapped_columns.length?`<div class="muted" style="margin-bottom:7px">Ignored</div>
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px">
            ${p.unmapped_columns.map(c=>`<span class="pill p-g">${esc(c)}</span>`).join('')}</div>`:''}
        ${p.preview.filter(r=>r.warnings.length||r.errors.length).slice(0,6)
          .map(r=>`<div class="muted" style="margin-bottom:4px">Row ${r.row}: ${esc([...r.errors,...r.warnings].join(' · '))}</div>`).join('')}
        <button class="btn" style="width:100%;margin-top:16px" onclick="commit()">
          Import ${p.valid} member${p.valid===1?'':'s'}</button>`;
    }catch(err){ $('#pv').innerHTML=`<div class="err">${esc(err.message)}</div>` }
  };
}
async function commit(){
  const i=window._i;
  const r=await api('/api/import/commit',{method:'POST',
    body:JSON.stringify({batch_id:i.batch_id,csv:i.csv,column_map:i.column_map})});
  alert(`Imported ${r.imported}. Skipped ${r.skipped}.`);
  await boot(); go('members');
}

(async()=>{
  const s=sessionStorage.getItem('church');
  if(s){CHURCH=s; try{await boot(); return}catch(e){}}
  $('#login').style.display='flex';
})();
</script>
</body>
</html>
