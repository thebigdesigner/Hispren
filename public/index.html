<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hispren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
:root{
  --violet:#6D4AFF; --violet-dk:#5B3FD9; --violet-soft:#EDEBFF; --violet-wash:#F7F6FF;
  --mint:#2DD4BF; --mint-dk:#0F766E; --mint-soft:#EAFBF8;
  --blue:#5B8DEF; --blue-soft:#EAF1FE;
  --pink:#FF6B8A; --pink-dk:#C42F52; --pink-soft:#FFE8EC;
  --amber:#FB923C; --amber-soft:#FFF1E6;
  --shell:#FFFFFF; --line:#EFEFF4; --line2:#F6F6FA;
  --text:#1F2033; --muted:#9A9EB0; --chip:#F3F3F7; --chip-tx:#767B8C;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;font-size:14px;color:var(--text);
  -webkit-font-smoothing:antialiased;min-height:100vh;
  background:linear-gradient(150deg,#C9BDFB 0%,#B9A9F7 40%,#A896F2 100%);
  background-attachment:fixed;padding:22px}
button{font-family:inherit;cursor:pointer;border:none;background:none}
input,select{font-family:inherit;font-size:13px;padding:10px 12px;border:1px solid var(--line);
  border-radius:10px;width:100%;background:#fff;color:var(--text)}
input:focus,select:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px var(--violet-soft)}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
.field{margin-bottom:14px}
.muted{color:var(--muted);font-size:12px}
.grad{background:linear-gradient(90deg,#2DD4BF 0%,#38BDF8 55%,#6D4AFF 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent}

.btn{background:var(--violet);color:#fff;font-size:13px;font-weight:600;padding:10px 18px;border-radius:12px}
.btn:hover{background:var(--violet-dk)}
.btn-o{background:#fff;color:var(--text);border:1px solid var(--line);font-weight:500}
.btn-o:hover{background:var(--violet-wash);border-color:var(--violet-soft)}
.pill{font-size:11px;padding:4px 10px;border-radius:7px;display:inline-block;white-space:nowrap;font-weight:600;letter-spacing:.03em}
.p-v{background:var(--violet-soft);color:var(--violet-dk)}
.p-m{background:var(--mint-soft);color:var(--mint-dk)}
.p-p{background:var(--pink-soft);color:var(--pink-dk)}
.p-g{background:var(--chip);color:var(--chip-tx)}
.err{background:var(--pink-soft);color:var(--pink-dk);padding:10px 13px;border-radius:10px;font-size:12px;margin-bottom:14px}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;
  width:32px;height:32px;font-size:11px;background:var(--violet-soft);color:var(--violet-dk)}
.mark{width:38px;height:38px;border-radius:12px;background:var(--violet);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:700}

#login{min-height:calc(100vh - 44px);display:flex;align-items:center;justify-content:center}
#login .box{background:#fff;border-radius:26px;padding:38px;width:100%;max-width:404px;
  box-shadow:0 24px 60px rgba(60,40,140,.18)}

/* ---------- shell ---------- */
#app{display:none}
.shell{background:var(--shell);border-radius:22px;display:flex;overflow:hidden;
  max-width:1200px;margin:0 auto;min-height:calc(100vh - 44px);
  box-shadow:0 28px 70px rgba(60,40,140,.22)}

.side{width:206px;flex-shrink:0;padding:18px 14px;border-right:1px solid var(--line);
  display:flex;flex-direction:column}
.prof{display:flex;align-items:center;gap:9px;padding:8px;border-radius:12px;margin-bottom:16px;cursor:pointer}
.prof:hover{background:var(--violet-wash)}
.nav{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;
  color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:1px;font-weight:500}
.nav i{font-size:17px}
.nav:hover{background:var(--violet-wash);color:var(--text)}
.nav.on{background:var(--violet-soft);color:var(--text);font-weight:600}
.nav.on i{color:var(--violet)}
.n{margin-left:auto;font-size:10px;background:var(--pink);color:#fff;
  padding:1px 6px;border-radius:7px;font-weight:700}
.sec{display:flex;align-items:center;justify-content:space-between;padding:20px 11px 8px}
.sec>span{font-size:12px;color:var(--muted);font-weight:500}
.add{font-size:12px;color:var(--violet);background:var(--violet-soft);
  padding:2px 8px;border-radius:7px;font-weight:600}
.dotrow{display:flex;align-items:center;gap:10px;padding:7px 11px;font-size:13px;cursor:pointer;border-radius:9px}
.dotrow:hover{background:var(--violet-wash)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.promo{background:linear-gradient(140deg,#7C6BFF,#6D4AFF);border-radius:16px;padding:14px;margin-top:auto}

/* ---------- main ---------- */
.main{flex:1;min-width:0;padding:22px 26px;overflow-x:hidden}
.hi{font-size:26px;font-weight:700;line-height:1.28;letter-spacing:-.01em}
.acts{display:flex;gap:8px;flex-wrap:wrap;margin:18px 0 20px}
.act{border:1px solid var(--line);background:#fff;color:var(--text);font-size:12px;font-weight:600;
  padding:9px 16px;border-radius:22px;display:flex;align-items:center;gap:6px}
.act:hover{background:var(--violet-wash);border-color:var(--violet-soft)}
.act.v{background:var(--violet);color:#fff;border-color:var(--violet)}
.act.v:hover{background:var(--violet-dk)}

.g2{display:grid;grid-template-columns:minmax(0,1.06fr) minmax(0,1fr);gap:16px}
.col{display:flex;flex-direction:column;gap:16px}
.card{background:#fff;border:1px solid var(--line);border-radius:18px;padding:16px 18px;
  box-shadow:0 2px 10px rgba(60,40,140,.04)}
.ch{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.ch i{font-size:16px;color:var(--violet)}
.ch b{font-size:13px;font-weight:700}
.ch .r{margin-left:auto;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:12px}
.ch .r i{font-size:15px;color:var(--muted);cursor:pointer}

.grouphdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.thead{display:grid;grid-template-columns:1fr 74px 84px;padding:0 0 7px;
  font-size:11px;color:var(--muted);font-weight:500}
.trow{display:grid;grid-template-columns:1fr 74px 84px;align-items:center;
  padding:9px 0;border-top:1px solid var(--line2);cursor:pointer}
.trow:hover{background:var(--violet-wash)}
.tname{display:flex;align-items:center;gap:8px;min-width:0}
.tname i{font-size:14px;color:var(--muted)}
.addrow{display:flex;align-items:center;gap:7px;padding:9px 0;color:var(--muted);
  font-size:12px;font-weight:500;cursor:pointer}
.addrow:hover{color:var(--violet)}

.goal{margin-bottom:15px}
.goal:last-child{margin-bottom:0}
.bar{height:6px;background:var(--chip);border-radius:4px;overflow:hidden;flex:1}
.bar>div{height:6px;border-radius:4px}

.gtiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.gt{display:flex;align-items:center;gap:10px;padding:10px;border-radius:13px;cursor:pointer}
.gt:hover{background:var(--violet-wash)}
.gt.new{border:1px dashed var(--line);color:var(--muted)}
.gt.new:hover{border-color:var(--violet);color:var(--violet)}
.gicon{width:32px;height:32px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}
.gicon i{font-size:16px;color:#fff}

.days{display:flex;align-items:center;gap:3px;margin-bottom:13px}
.day{flex:1;text-align:center;padding:6px 0;border-radius:11px;cursor:pointer}
.day:hover{background:var(--violet-wash)}
.day .w{font-size:11px;color:var(--muted)}
.day .d{font-size:13px;font-weight:600;margin-top:2px}
.day.on{background:var(--violet)}
.day.on .w{color:#CFC4FF} .day.on .d{color:#fff}
.event{background:var(--violet-wash);border-radius:14px;padding:12px}
.stack{display:flex;align-items:center}
.stack .av{width:24px;height:24px;font-size:10px;border:2px solid #fff;margin-left:-7px}
.stack .av:first-child{margin-left:0}

.rem{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-top:1px solid var(--line2)}
.rem:first-of-type{border-top:none}
.rem .t{flex:1;font-size:12px;line-height:1.55;min-width:0}
.rem i{font-size:15px;color:var(--muted);cursor:pointer}
.rem i:hover{color:var(--violet)}

.fab{position:fixed;right:34px;bottom:34px;width:52px;height:52px;border-radius:50%;
  background:linear-gradient(140deg,#FF6B8A,#8B5CF6);color:#fff;display:flex;
  align-items:center;justify-content:center;box-shadow:0 10px 26px rgba(139,92,246,.42);z-index:8}
.fab i{font-size:22px}
.fab:hover{transform:scale(1.05)}

table{width:100%;border-collapse:collapse}
th{font-size:11px;color:var(--muted);font-weight:500;text-align:left;padding:0 12px 9px}
td{padding:11px 12px;border-top:1px solid var(--line2);font-size:13px;vertical-align:middle}
tbody tr{cursor:pointer} tbody tr:hover{background:var(--violet-wash)}
tr.dupe{background:var(--pink-soft)}

.mbg{position:fixed;inset:0;background:rgba(43,31,90,.42);backdrop-filter:blur(4px);
  display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow-y:auto;z-index:9}
.modal{background:#fff;border-radius:24px;padding:26px;width:100%;max-width:660px;
  box-shadow:0 30px 80px rgba(43,31,90,.3)}
.sect{font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.04em;margin:20px 0 12px;
  padding-bottom:7px;border-bottom:1px solid var(--line)}
.sect:first-of-type{margin-top:0}
.row{display:flex;justify-content:space-between;padding:8px 0;font-size:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.gg2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:900px){.shell{flex-direction:column}.side{width:100%;border-right:none;border-bottom:1px solid var(--line)}
  .g2,.g3,.gg2,.gtiles{grid-template-columns:1fr}.promo{margin-top:16px}}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div style="display:flex;align-items:center;gap:11px">
      <div class="mark">H</div><div style="font-size:19px;font-weight:700">Hispren</div>
    </div>
    <div class="hi" style="font-size:21px;margin:22px 0 2px">Welcome back</div>
    <div class="hi grad" style="font-size:21px;margin-bottom:26px">Let's look after your church.</div>
    <div id="lerr"></div>
    <div class="field"><label>Church</label><input id="church" value="dominion" autocomplete="off"></div>
    <div class="field"><label>Email</label><input id="email" type="email" value="pastor@dominion.test" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="pw" type="password" value="DominionPastor2026" autocomplete="current-password"></div>
    <button class="btn" style="width:100%;margin-top:6px" onclick="doLogin()">Sign in</button>
  </div>
</div>

<div id="app"><div class="shell">
  <div class="side">
    <div class="prof">
      <div class="av" id="pAv">—</div>
      <div style="min-width:0;flex:1">
        <div style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" id="pName">—</div>
        <div style="font-size:11px;color:var(--mint);font-weight:600">Online</div>
      </div>
      <i class="ti ti-chevron-down" style="font-size:14px;color:var(--muted)"></i>
    </div>

    <div class="nav on" data-v="home"       onclick="go('home')"><i class="ti ti-home"></i>Home</div>
    <div class="nav"    data-v="ai"         onclick="askAI()"><i class="ti ti-sparkles"></i>Hispren AI</div>
    <div class="nav"    data-v="members"    onclick="go('members')"><i class="ti ti-users"></i>Members</div>
    <div class="nav"    data-v="duplicates" onclick="go('duplicates')"><i class="ti ti-copy"></i>Duplicates<span id="dBadge"></span></div>
    <div class="nav"    data-v="import"     onclick="go('import')"><i class="ti ti-upload"></i>Bulk import</div>

    <div class="sec"><span>My church</span><span class="add">+ Add</span></div>
    <div id="groups"></div>

    <div class="nav" style="margin-top:18px"><i class="ti ti-settings"></i>Settings</div>

    <div class="promo">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:7px">
        <i class="ti ti-device-mobile" style="font-size:14px;color:#fff"></i>
        <span style="font-size:12px;color:#fff;font-weight:700">hispren</span></div>
      <div style="font-size:11px;color:#DDD6FF;line-height:1.6;margin-bottom:12px">
        Members with the app never miss an announcement.</div>
      <button style="background:#fff;color:var(--violet-dk);font-size:12px;font-weight:700;
        padding:7px 11px;border-radius:10px;width:100%">+ Invite members</button>
    </div>
    <div class="nav" style="margin-top:10px" onclick="logout()"><i class="ti ti-logout"></i>Sign out</div>
  </div>

  <div class="main">
    <div class="muted" id="today">—</div>
    <div class="hi" id="hi">—</div>
    <div class="hi grad">How is your church doing today?</div>
    <div class="acts">
      <button class="act v" onclick="askAI()"><i class="ti ti-sparkles"></i>Ask Hispren</button>
      <button class="act" onclick="openForm()">Register a member</button>
      <button class="act" onclick="go('import')">Import a spreadsheet</button>
      <button class="act" onclick="go('duplicates')">Review duplicates</button>
    </div>
    <div id="view"></div>
  </div>
</div></div>

<button class="fab" onclick="openForm()" aria-label="Register a member"><i class="ti ti-plus"></i></button>
<div id="modal"></div>

<script>
let CHURCH='', ME=null, DUPES=[], MEMBERS=[];
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ini=n=>(n||'?').split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase();
const GC=[['var(--violet)','ti-building-church'],['var(--blue)','ti-users-group'],
          ['var(--mint)','ti-microphone-2'],['var(--amber)','ti-home-2']];

async function api(p,o={}){
  const r=await fetch(p,{...o,headers:{'Content-Type':'application/json','X-Church':CHURCH,...(o.headers||{})},credentials:'include'});
  if(r.status===401){logout();throw new Error('signed out')}
  const b=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(b.detail||b.error||'request failed');
  return b;
}
function askAI(){alert('Hispren AI arrives in Phase 2 — it needs the automation engine underneath it first.')}
async function doLogin(){
  CHURCH=$('#church').value.trim().toLowerCase(); $('#lerr').innerHTML='';
  try{
    await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:$('#email').value.trim(),password:$('#pw').value})});
    sessionStorage.setItem('church',CHURCH); await boot();
  }catch(e){ $('#lerr').innerHTML=`<div class="err">${esc(e.message)}</div>` }
}
function logout(){
  fetch('/api/auth/logout',{method:'POST',headers:{'X-Church':CHURCH},credentials:'include'}).catch(()=>{});
  sessionStorage.clear(); $('#app').style.display='none'; $('#login').style.display='flex';
}

async function boot(){
  ME=await api('/api/me');
  $('#login').style.display='none'; $('#app').style.display='block';
  $('#pName').textContent=ME.tenant.name; $('#pAv').textContent=ini(ME.tenant.name);
  $('#today').textContent=new Date().toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'long'});
  $('#hi').textContent='Hello there';
  MEMBERS=(await api('/api/members?limit=200')).members;
  DUPES=await api('/api/duplicates').catch(()=>[]);
  $('#dBadge').outerHTML=DUPES.length?`<span class="n" id="dBadge">${DUPES.length}</span>`:'<span id="dBadge"></span>';
  const gs=[...new Set(MEMBERS.map(m=>m.home_group_name).filter(Boolean))];
  $('#groups').innerHTML=gs.map((g,i)=>`<div class="dotrow" onclick="go('members')">
    <span class="dot" style="background:${GC[i%4][0]}"></span>${esc(g)}</div>`).join('')
    ||'<div class="muted" style="padding:7px 11px">No groups yet</div>';
  go('home');
}
function go(v){
  document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('on',n.dataset.v===v));
  ({home:viewHome,members:viewMembers,duplicates:viewDupes,import:viewImport})[v]();
}

/* ================================ HOME ================================ */
function viewHome(){
  const t=MEMBERS.length;
  const call=MEMBERS.filter(m=>m.stage_key==='visitor'||m.stage_key==='first_timer');
  const noc=MEMBERS.filter(m=>!m.phone&&!m.phone_2&&!m.email).length;
  const reach=t?Math.round((t-noc)/t*100):0;
  const withGroup=MEMBERS.filter(m=>m.home_group_name).length;
  const gpct=t?Math.round(withGroup/t*100):0;
  const dpct=t?Math.max(4,Math.min(100,Math.round(DUPES.length/t*100*6))):0;
  const svc=k=>MEMBERS.filter(m=>m.usual_service===k).length;
  const S=[svc('1st Service'),svc('2nd Service'),svc('3rd Service')];
  const gs=[...new Set(MEMBERS.map(m=>m.home_group_name).filter(Boolean))];

  // calendar strip — this week, Sunday highlighted
  const now=new Date(); const dow=now.getDay();
  const days=[...Array(7)].map((_,i)=>{ const d=new Date(now); d.setDate(now.getDate()-dow+i); return d; });

  $('#view').innerHTML=`<div class="g2">
  <div class="col">

    <div class="card">
      <div class="ch"><i class="ti ti-checkbox"></i><b>Follow-ups</b>
        <span class="r"><i class="ti ti-plus" onclick="openForm()"></i><i class="ti ti-dots"></i></span></div>

      <div class="grouphdr">
        <i class="ti ti-chevron-down" style="font-size:13px;color:var(--muted)"></i>
        <span class="pill p-v">TO CALL</span>
        <span class="muted">${call.length} ${call.length===1?'person':'people'}</span></div>

      <div class="thead"><span>Name</span><span>Priority</span><span>Waiting</span></div>
      ${call.slice(0,4).map((m,i)=>`
        <div class="trow" onclick="openMember('${m.id}')">
          <div class="tname">
            <i class="ti ti-chevron-right"></i>
            <i class="ti ti-${m.stage_key==='visitor'?'user-question':'user-plus'}"></i>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(m.full_name)}</span>
          </div>
          <span class="pill ${i<2?'p-p':'p-g'}">${i<2?'High':'Low'}</span>
          <span style="font-size:12px;color:${i<2?'var(--pink-dk)':'var(--muted)'};font-weight:${i<2?600:400}">
            ${i<2?'Today':(i+2)+' days'}</span>
        </div>`).join('')||'<div class="muted" style="padding:10px 0">Nobody is waiting. Good.</div>'}
      <div class="addrow" onclick="openForm()"><i class="ti ti-plus" style="font-size:13px"></i>Add a follow-up</div>

      <div class="grouphdr" style="margin-top:8px">
        <i class="ti ti-chevron-right" style="font-size:13px;color:var(--muted)"></i>
        <span class="pill p-m">CONTACTED</span>
        <span class="muted">${Math.max(0,t-call.length-noc)} people</span></div>
      <div class="grouphdr" style="margin-top:8px">
        <i class="ti ti-chevron-right" style="font-size:13px;color:var(--muted)"></i>
        <span class="pill p-g">NO PHONE</span>
        <span class="muted">${noc} ${noc===1?'person':'people'}</span></div>
    </div>

    <div class="card">
      <div class="ch"><i class="ti ti-target-arrow"></i><b>Church health</b></div>

      <div class="goal">
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:7px">
          <div><div style="font-size:13px;font-weight:500">Members we can reach</div>
            <div class="muted">${t-noc} of ${t} · phone or email</div></div></div>
        <div style="display:flex;align-items:center;gap:11px">
          <div class="bar"><div style="width:${reach}%;background:var(--mint)"></div></div>
          <b style="font-size:12px;min-width:32px;text-align:right">${reach}%</b></div>
      </div>

      <div class="goal">
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:7px">
          <div><div style="font-size:13px;font-weight:500">Members in a cell or department</div>
            <div class="muted">${withGroup} of ${t} · nobody should be invisible</div></div></div>
        <div style="display:flex;align-items:center;gap:11px">
          <div class="bar"><div style="width:${gpct}%;background:${gpct<50?'var(--amber)':'var(--mint)'}"></div></div>
          <b style="font-size:12px;min-width:32px;text-align:right">${gpct}%</b></div>
      </div>

      <div class="goal">
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:7px">
          <div><div style="font-size:13px;font-weight:500">Records needing review</div>
            <div class="muted">${DUPES.length} possible duplicate${DUPES.length===1?'':'s'}</div></div></div>
        <div style="display:flex;align-items:center;gap:11px">
          <div class="bar"><div style="width:${dpct}%;background:var(--pink)"></div></div>
          <b style="font-size:12px;min-width:32px;text-align:right">${DUPES.length}</b></div>
      </div>
    </div>
  </div>

  <div class="col">

    <div class="card">
      <div class="ch"><i class="ti ti-layout-grid"></i><b>Groups</b>
        <span class="r">All <i class="ti ti-chevron-down"></i></span></div>
      <div class="gtiles">
        <div class="gt new" onclick="alert('Group creation ships with the Cells module.')">
          <div class="gicon" style="background:var(--chip)"><i class="ti ti-plus" style="color:var(--muted)"></i></div>
          <div style="font-size:12px;font-weight:600">New group</div>
        </div>
        ${gs.slice(0,3).map((g,i)=>{
          const n=MEMBERS.filter(m=>m.home_group_name===g).length;
          return `<div class="gt" onclick="go('members')">
            <div class="gicon" style="background:${GC[i%4][0]}"><i class="ti ${GC[i%4][1]}"></i></div>
            <div style="min-width:0">
              <div style="font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(g)}</div>
              <div class="muted">${n} member${n===1?'':'s'}</div>
            </div></div>`;}).join('')}
      </div>
    </div>

    <div class="card">
      <div class="ch"><i class="ti ti-calendar"></i><b>${now.toLocaleDateString('en-GB',{month:'long'})}</b>
        <span class="r"><i class="ti ti-chevron-left"></i><i class="ti ti-chevron-right"></i></span></div>
      <div class="days">
        ${days.map(d=>`<div class="day ${d.getDay()===0?'on':''}">
          <div class="w">${d.toLocaleDateString('en-GB',{weekday:'short'})}</div>
          <div class="d">${String(d.getDate()).padStart(2,'0')}</div></div>`).join('')}
      </div>
      <div class="event">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div><div style="font-size:13px;font-weight:600">Sunday service</div>
            <div class="muted">2nd service · 9:00 – 11:00 am</div></div>
          <i class="ti ti-dots" style="font-size:15px;color:var(--muted);cursor:pointer"></i></div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:11px">
          <span class="pill p-v"><i class="ti ti-qrcode" style="font-size:11px"></i> QR check-in</span>
          <div class="stack">
            ${MEMBERS.slice(0,3).map((m,i)=>`<div class="av"
              style="background:${['var(--violet-soft)','var(--mint-soft)','var(--pink-soft)'][i]};
                     color:${['var(--violet-dk)','var(--mint-dk)','var(--pink-dk)'][i]}">
              ${ini(m.full_name)}</div>`).join('')}
            ${MEMBERS.length>3?`<span class="muted" style="margin-left:7px">+${MEMBERS.length-3}</span>`:''}
          </div>
        </div>
      </div>
      <div style="display:flex;gap:7px;margin-top:12px">
        ${['1st','2nd','3rd'].map((l,i)=>{
          const on=S[i]===Math.max(...S)&&Math.max(...S)>0;
          return `<div style="flex:1;text-align:center;padding:9px 0;border-radius:11px;
            background:${on?'var(--violet)':'var(--violet-wash)'}">
            <div style="font-size:11px;color:${on?'#CFC4FF':'var(--muted)'}">${l}</div>
            <div style="font-size:16px;font-weight:700;color:${on?'#fff':'var(--text)'}">${S[i]}</div>
          </div>`;}).join('')}
      </div>
    </div>

    <div class="card">
      <div class="ch"><i class="ti ti-bell"></i><b>Reminders</b>
        <span class="r">Today · ${(DUPES.length?1:0)+(noc?1:0)+1} <i class="ti ti-chevron-down"></i></span></div>
      ${DUPES.length?`<div class="rem">
        <span class="dot" style="background:var(--pink);margin-top:6px"></span>
        <div class="t">${DUPES.length} possible duplicate member${DUPES.length===1?'':'s'}. Review before they get two welcome texts.</div>
        <i class="ti ti-chevron-right" onclick="go('duplicates')"></i></div>`:''}
      ${noc?`<div class="rem">
        <span class="dot" style="background:var(--amber);margin-top:6px"></span>
        <div class="t">${noc} member${noc===1?'':'s'} have no phone or email. They cannot be reached at all.</div>
        <i class="ti ti-chevron-right" onclick="go('members')"></i></div>`:''}
      <div class="rem">
        <span class="dot" style="background:var(--mint);margin-top:6px"></span>
        <div class="t">${call.length} first timer${call.length===1?'':'s'} waiting on a call. The first 72 hours decide whether they come back.</div>
        <i class="ti ti-chevron-right" onclick="go('members')"></i></div>
    </div>
  </div>
  </div>`;
}

/* ============================== MEMBERS =============================== */
async function viewMembers(q=''){
  const d=await api('/api/members?limit=200'+(q?'&q='+encodeURIComponent(q):''));
  const flag=new Set(DUPES.flatMap(x=>[x.person_a.id,x.person_b.id]));
  $('#view').innerHTML=`<div class="card">
    <div class="ch"><i class="ti ti-users"></i><b>Members</b>
      <span class="r">${d.total} total</span></div>
    <div style="display:flex;gap:9px;margin-bottom:14px">
      <input id="q" value="${esc(q)}" placeholder="Search name, phone, code">
      <button class="btn" style="white-space:nowrap" onclick="openForm()">+ Register</button></div>
    <table><thead><tr><th>Member</th><th>Phone</th><th>Stage</th><th>Group</th><th>Service</th></tr></thead>
    <tbody>${d.members.map(m=>`<tr class="${flag.has(m.id)?'dupe':''}" onclick="openMember('${m.id}')">
      <td><div style="display:flex;align-items:center;gap:11px">
        <div class="av">${ini(m.full_name)}</div>
        <div><div style="font-weight:600">${esc(m.full_name)}</div>
        ${flag.has(m.id)?'<div class="muted" style="color:var(--pink-dk)">Possible duplicate</div>':''}</div>
      </div></td>
      <td class="muted">${esc(m.phone||m.phone_2||'—')}</td>
      <td><span class="pill ${m.stage_key==='first_timer'?'p-m':m.stage_key==='visitor'?'p-p':'p-v'}">${esc(m.stage_label||'—')}</span></td>
      <td class="muted">${esc(m.home_group_name||'—')}</td>
      <td class="muted">${esc((m.usual_service||'—').replace(' Service',''))}</td>
    </tr>`).join('')||'<tr><td colspan="5" class="muted">No members found.</td></tr>'}
    </tbody></table></div>`;
  const b=$('#q'); b.oninput=e=>{clearTimeout(window._t);window._t=setTimeout(()=>viewMembers(e.target.value),300)};
  b.focus(); b.setSelectionRange(b.value.length,b.value.length);
}

async function openMember(id){
  const m=await api('/api/members/'+id);
  const qr=await api(`/api/members/${id}/qr`).catch(()=>null);
  let h=null; try{h=await api(`/api/members/${id}/health`)}catch(e){}
  const f=(l,v)=>v?`<div class="row"><span class="muted">${l}</span><span>${esc(v)}</span></div>`:'';
  const carrier=h&&['AS','SS','AC','SC'].includes(h.genotype);
  $('#modal').innerHTML=`<div class="mbg" onclick="if(event.target===this)close_()"><div class="modal">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px">
      <div class="av" style="width:52px;height:52px;font-size:17px">${ini(m.full_name)}</div>
      <div style="flex:1"><div style="font-size:19px;font-weight:700">${esc(m.full_name)}</div>
        <div class="muted">${esc(m.stage_label||'')} · ${esc(m.home_group_name||'no group')}</div></div>
      <span class="pill p-g">${esc(m.source||'')}</span></div>
    <div class="sect">CONTACT</div>
    ${f('Phone',m.phone)}${f('Second phone',m.phone_2)}${f('Email',m.email)}
    ${f('Address',m.address)}${f('Town',m.town)}${f('LGA',m.lga)}
    <div class="sect">ORIGIN</div>
    ${f('State of origin',m.state_of_origin)}${f('LGA of origin',m.lga_of_origin)}
    ${f('Date of birth',(m.date_of_birth||'').slice(0,10))}${f('Gender',m.gender)}${f('Marital status',m.marital_status)}
    <div class="sect">CHURCH</div>
    ${f('Service',m.usual_service)}${f('Post held',m.post_held)}
    ${f('Work / school',m.occupation)}${f('Place of work',m.workplace)}
    ${h?`<div class="sect">HEALTH — PASTOR ONLY. THIS VIEW WAS LOGGED.</div>
      <div class="row"><span class="muted">Genotype</span>
        <span class="pill ${carrier?'p-p':'p-m'}">${esc(h.genotype||'—')}</span></div>
      ${f('Blood group',h.blood_group)}
      ${carrier?`<div style="background:var(--pink-soft);color:var(--pink-dk);padding:12px 14px;
        border-radius:13px;font-size:12px;line-height:1.7;margin-top:10px">
        Carrier. Flag before marriage counselling — AS x AS carries a 1-in-4 risk of a child
        with sickle cell disease.</div>`:''}`:''}
    ${qr?`<div class="sect">QR IDENTITY</div>
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <img alt="QR code" width="104" height="104" style="border-radius:13px;border:1px solid var(--line)"
          src="https://api.qrserver.com/v1/create-qr-code/?size=104x104&data=${encodeURIComponent(qr.qr_token)}">
        <div style="flex:1;min-width:190px"><div class="muted" style="line-height:1.7">Scanned at the gate to mark
          attendance. If it leaks, rotate it — no need to reprint an ID card.</div>
          <button class="btn btn-o" style="margin-top:10px" onclick="rot('${id}')">Rotate code</button></div>
      </div>`:''}
    <button class="btn btn-o" style="width:100%;margin-top:24px" onclick="close_()">Close</button>
  </div></div>`;
}
async function rot(id){await api(`/api/members/${id}/qr/rotate`,{method:'POST'});openMember(id)}
function close_(){$('#modal').innerHTML=''}

function openForm(){
  const t=(n,l,ty='text')=>`<div class="field"><label>${l}</label><input id="f_${n}" type="${ty}"></div>`;
  $('#modal').innerHTML=`<div class="mbg" onclick="if(event.target===this)close_()"><div class="modal">
    <div style="font-size:20px;font-weight:700">Register a member</div>
    <div class="muted" style="margin-bottom:22px;line-height:1.7">
      Phone numbers are cleaned automatically. Duplicates are flagged, never merged without you.</div>
    <div id="ferr"></div>
    <div class="sect">NAME</div>
    <div class="g3">${t('first_name','First name')}${t('middle_name','Other name')}${t('last_name','Surname')}</div>
    <div class="sect">CONTACT — MOST PEOPLE CARRY TWO SIMS</div>
    <div class="gg2">${t('phone','Phone 1')}${t('phone_2','Phone 2')}</div>${t('email','Email','email')}
    <div class="sect">ORIGIN</div>
    <div class="gg2">${t('state_of_origin','State of origin')}${t('lga_of_origin','LGA of origin')}</div>
    <div class="sect">RESIDENCE</div>${t('address','Address')}
    <div class="gg2">${t('town','Town')}${t('lga','LGA')}</div>
    <div class="sect">DETAILS</div>
    <div class="gg2">
      <div class="field"><label>Gender</label><select id="f_gender">
        <option value="">-</option><option value="male">Male</option><option value="female">Female</option></select></div>
      ${t('date_of_birth','Date of birth','date')}</div>
    <div class="gg2">${t('occupation','Work / school')}${t('workplace','Place of work / school')}</div>
    <div class="gg2">
      <div class="field"><label>Service</label><select id="f_usual_service">
        <option value="">-</option><option>1st Service</option><option>2nd Service</option><option>3rd Service</option></select></div>
      ${t('post_held','Post held')}</div>
    <div style="display:flex;gap:10px;margin-top:24px">
      <button class="btn btn-o" style="flex:1" onclick="close_()">Cancel</button>
      <button class="btn" style="flex:2" onclick="save()">Register member</button></div>
  </div></div>`;
}
async function save(){
  const ks=['first_name','middle_name','last_name','phone','phone_2','email','state_of_origin',
    'lga_of_origin','address','town','lga','gender','date_of_birth','occupation','workplace','usual_service','post_held'];
  const b={source:'manual'}; ks.forEach(k=>{const el=$('#f_'+k);const v=el&&el.value.trim();if(v)b[k]=v});
  if(!b.first_name){$('#ferr').innerHTML='<div class="err">A first name is required.</div>';return}
  try{await api('/api/members',{method:'POST',body:JSON.stringify(b)});close_();await boot();go('members')}
  catch(e){$('#ferr').innerHTML=`<div class="err">${esc(e.message)}</div>`}
}

/* ============================ DUPLICATES ============================== */
async function viewDupes(){
  DUPES=await api('/api/duplicates');
  $('#view').innerHTML=`
   <div class="card" style="margin-bottom:16px">
     <div class="ch"><i class="ti ti-copy"></i><b>Duplicates</b></div>
     <div class="muted" style="line-height:1.8">
       A name alone is never enough — Nigerian names repeat. These records share a phone number,
       an email, or a date of birth. Nothing is merged without you.</div></div>
   ${DUPES.length?DUPES.map(x=>`<div class="card" style="margin-bottom:16px">
     <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;flex-wrap:wrap">
       <div style="display:flex;gap:7px;flex-wrap:wrap">
         ${(x.reasons||[]).map(r=>`<span class="pill p-p">${esc(r)}</span>`).join('')}</div>
       <span class="muted">score ${x.score}</span></div>
     <div class="gg2">
       ${[x.person_a,x.person_b].map((p,i)=>`
         <div style="border:1px solid var(--line);border-radius:15px;padding:14px">
           <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
             <div class="av">${ini(p.name)}</div>
             <div><div style="font-weight:700;font-size:13px">${esc(p.name)}</div>
             <div class="muted">${esc(p.phone||'no phone')}</div></div></div>
           <div class="muted">${esc(p.source||'')} · added ${new Date(p.created_at).toLocaleDateString('en-GB')}</div>
           <button class="btn" style="width:100%;margin-top:12px"
             onclick="mg('${p.id}','${(i?x.person_a:x.person_b).id}')">Keep this one</button>
         </div>`).join('')}</div>
     <button class="btn btn-o" style="width:100%;margin-top:12px" onclick="dis('${x.id}')">
       These are different people</button>
   </div>`).join('')
   :'<div class="card muted">Nothing to review.</div>'}`;
}
async function mg(keep,drop){
  if(!confirm('Merge these? The other record is archived - but kept in full in the merge log, forever.'))return;
  await api('/api/duplicates/merge',{method:'POST',body:JSON.stringify({keep_id:keep,merge_id:drop})});
  await boot(); go('duplicates');
}
async function dis(id){await api(`/api/duplicates/${id}/dismiss`,{method:'POST'});await boot();go('duplicates')}

/* ============================== IMPORT ================================ */
function viewImport(){
  $('#view').innerHTML=`<div class="card">
    <div class="ch"><i class="ti ti-upload"></i><b>Bulk import</b></div>
    <div class="muted" style="line-height:1.8;margin-bottom:16px">
      Upload a CSV. Columns are matched for you, phone numbers cleaned, dates read in Nigerian
      order. Nothing is written until you say so - and any import can be undone.</div>
    <input type="file" id="csv" accept=".csv"
      style="border:1px dashed var(--line);padding:24px;border-radius:15px;background:var(--violet-wash)">
    <div id="pv" style="margin-top:18px"></div></div>`;
  $('#csv').onchange=async e=>{
    const file=e.target.files[0]; if(!file)return;
    const csv=await file.text(); $('#pv').innerHTML='<div class="muted">Reading…</div>';
    try{
      const p=await api('/api/import/preview',{method:'POST',body:JSON.stringify({filename:file.name,csv})});
      window._i={csv,...p};
      $('#pv').innerHTML=`
        <div style="display:flex;gap:26px;margin-bottom:18px">
          <div><div class="muted">Rows</div><div style="font-size:23px;font-weight:700">${p.total}</div></div>
          <div><div class="muted">Valid</div><div style="font-size:23px;font-weight:700;color:var(--mint-dk)">${p.valid}</div></div>
          <div><div class="muted">Problems</div><div style="font-size:23px;font-weight:700;color:${p.errors?'var(--pink-dk)':'inherit'}">${p.errors}</div></div>
        </div>
        <div class="muted" style="margin-bottom:7px">Columns we matched</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px">
          ${Object.entries(p.column_map).map(([h,f])=>`<span class="pill p-v">${esc(h)} → ${esc(f)}</span>`).join('')}</div>
        ${p.unmapped_columns.length?`<div class="muted" style="margin-bottom:7px">Ignored</div>
          <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px">
            ${p.unmapped_columns.map(c=>`<span class="pill p-g">${esc(c)}</span>`).join('')}</div>`:''}
        ${p.preview.filter(r=>r.warnings.length||r.errors.length).slice(0,6)
          .map(r=>`<div class="muted" style="margin-bottom:4px">Row ${r.row}: ${esc([...r.errors,...r.warnings].join(' · '))}</div>`).join('')}
        <button class="btn" style="width:100%;margin-top:16px" onclick="commit()">
          Import ${p.valid} member${p.valid===1?'':'s'}</button>`;
    }catch(err){$('#pv').innerHTML=`<div class="err">${esc(err.message)}</div>`}
  };
}
async function commit(){
  const i=window._i;
  const r=await api('/api/import/commit',{method:'POST',
    body:JSON.stringify({batch_id:i.batch_id,csv:i.csv,column_map:i.column_map})});
  alert(`Imported ${r.imported}. Skipped ${r.skipped}.`);
  await boot(); go('members');
}

(async()=>{
  const s=sessionStorage.getItem('church');
  if(s){CHURCH=s;try{await boot();return}catch(e){}}
  $('#login').style.display='flex';
})();
</script>
</body>
</html>
