<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hispren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400;500&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.2.0/dist/tabler-icons.min.css" rel="stylesheet">
<style>
:root{
  /* Termii console. Near-black sidebar, white cards, one green. */
  --ink:#12141A; --body:#4A4F5C; --muted:#8B92A0; --faint:#B9BEC8;
  --brand:#00C389; --brand-dk:#00996B; --brand-deep:#00674A;
  --brand-soft:#E4F8F0; --brand-wash:#F2FCF8;
  --good:#00C389; --good-soft:#E4F8F0; --good-dk:#00674A;
  --warn:#F5A623; --warn-soft:#FEF4E4; --warn-dk:#8A5A00;
  --bad:#E5484D;  --bad-soft:#FDECEC;  --bad-dk:#A81E22;
  --shell:#0D0F14; --shell-2:#171A21; --shell-line:#252932; --shell-tx:#8B92A0;
  --canvas:#F7F8FA; --card:#FFFFFF; --line:#E8EAEE; --line2:#F1F2F5;

  --head:'DM Sans',system-ui,sans-serif;   /* headings, UI */
  --text:'Karla',system-ui,sans-serif;     /* prose */
  --mono:'DM Mono',ui-monospace,monospace; /* FIGURES. Numbers must line up. */
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--text);background:var(--canvas);color:var(--body);
  font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
h1,h2,h3,.h{font-family:var(--head);color:var(--ink);letter-spacing:-.015em;font-weight:600}

/* Every figure is DM Mono, tabular. A column of phone numbers or attendance
   counts must line up — that is what makes a dashboard scannable. */
.num{font-family:var(--mono);font-weight:500;font-variant-numeric:tabular-nums}

button{font-family:var(--head);cursor:pointer;border:none;background:none}
input,select,textarea{font-family:var(--text);font-size:14px;padding:10px 13px;
  border:1px solid var(--line);border-radius:8px;width:100%;background:#fff;color:var(--ink)}
/* Checkboxes must not inherit width:100% and stretch across the cell. */
input[type=checkbox]{width:16px;height:16px;padding:0;accent-color:var(--brand);cursor:pointer}
input[type=color]{padding:3px;height:42px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--brand);
  box-shadow:0 0 0 3px var(--brand-soft)}
label{display:block;font-family:var(--head);font-size:12px;font-weight:600;color:var(--muted);
  margin-bottom:7px;text-transform:uppercase;letter-spacing:.06em}
.field{margin-bottom:16px}
.muted{color:var(--muted);font-size:13px}

.btn{font-family:var(--head);background:var(--brand);color:#062B20;font-size:14px;
  font-weight:600;padding:10px 20px;border-radius:8px;transition:background .15s}
.btn:hover{background:var(--brand-dk);color:#fff}
.btn-o{background:#fff;color:var(--ink);border:1px solid var(--line);font-weight:600}
.btn-o:hover{background:var(--brand-wash);border-color:var(--brand-soft)}
.tag{font-family:var(--head);font-size:11px;font-weight:700;padding:4px 9px;border-radius:5px;
  display:inline-block;white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
.t-b{background:var(--brand-soft);color:var(--brand-deep)}
.t-g{background:var(--good-soft);color:var(--good-dk)}
.t-w{background:var(--warn-soft);color:var(--warn-dk)}
.t-r{background:var(--bad-soft);color:var(--bad-dk)}
.t-n{background:var(--line2);color:var(--muted)}
.err{background:var(--bad-soft);color:var(--bad-dk);padding:11px 14px;border-radius:8px;
  font-size:13px;margin-bottom:16px}

.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:20px 22px}
.ch{display:flex;align-items:center;gap:9px;padding-bottom:14px;margin-bottom:16px;
  border-bottom:1px solid var(--line2)}
.ch i{font-size:17px;color:var(--brand-dk)}
.ch h3{font-size:16px;font-weight:600}
.ch .r{margin-left:auto;font-family:var(--mono);font-size:13px;color:var(--muted)}
.av{border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  width:34px;height:34px;font-family:var(--head);font-size:12px;font-weight:700;
  background:var(--brand-soft);color:var(--brand-deep)}

#login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:var(--shell)}
#login .box{background:#fff;border-radius:14px;padding:40px;width:100%;max-width:400px}
.mark{width:40px;height:40px;border-radius:9px;background:var(--brand);color:#062B20;
  display:flex;align-items:center;justify-content:center;font-family:var(--head);
  font-size:21px;font-weight:700}

#app{display:none}
.wrap{display:flex;min-height:100vh;align-items:stretch}

/* Sidebar: near-black, like the Termii console. */
.side{width:236px;flex-shrink:0;background:var(--shell);padding:22px 14px;
  display:flex;flex-direction:column;position:sticky;top:0;
  height:100vh;overflow-y:auto}
/* If the nav ever outgrows the viewport it scrolls inside the black, rather
   than spilling nav items onto the white page. */
.side::-webkit-scrollbar{width:0}
.brand{display:flex;align-items:center;gap:11px;padding:0 8px 26px}
.brand .t{font-family:var(--head);font-size:19px;font-weight:700;color:#fff}
.slab{font-family:var(--head);font-size:11px;font-weight:600;color:#5A6070;letter-spacing:.1em;
  text-transform:uppercase;padding:20px 10px 8px}
.nav{display:flex;align-items:center;gap:12px;padding:10px;border-radius:7px;
  color:var(--shell-tx);font-family:var(--head);font-size:14px;font-weight:500;
  cursor:pointer;margin-bottom:1px;border-left:2px solid transparent}
.nav i{font-size:18px}
.nav:hover{background:var(--shell-2);color:#fff}
.nav.on{background:var(--shell-2);color:#fff;border-left-color:var(--brand)}
.nav.on i{color:var(--brand)}
.nav .n{margin-left:auto;font-family:var(--mono);font-size:11px;font-weight:500;
  background:var(--bad);color:#fff;padding:1px 7px;border-radius:9px}
.who{margin-top:auto;padding:16px 10px 0;border-top:1px solid var(--shell-line);
  display:flex;align-items:center;gap:11px}
.who .av{background:var(--shell-2);color:var(--brand)}
.who > div > div:first-child{color:#fff!important}

.main{flex:1;min-width:0;padding:30px 36px}
.top{display:flex;justify-content:space-between;align-items:flex-end;
  margin-bottom:26px;gap:16px;flex-wrap:wrap}
.top h1{font-size:28px;font-weight:600;line-height:1.2}
.top .sub{font-size:14px;color:var(--muted);margin-top:3px}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.kpi{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.kpi .l{font-family:var(--head);font-size:12px;font-weight:600;color:var(--muted);
  text-transform:uppercase;letter-spacing:.06em}
.kpi .v{font-family:var(--mono);font-size:30px;font-weight:500;color:var(--ink);
  line-height:1.2;margin-top:8px;font-variant-numeric:tabular-nums}
.kpi .d{font-size:12px;margin-top:4px}
.kpi.acc{border-left:3px solid var(--brand)}
.kpi.bad{border-left:3px solid var(--bad)}
.kpi.warn{border-left:3px solid var(--warn)}

.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:16px}
.col{display:flex;flex-direction:column;gap:16px}
.bar{height:7px;background:var(--line2);border-radius:4px;overflow:hidden;flex:1}
.bar>div{height:7px;border-radius:4px}
.meter{margin-bottom:18px}
.meter:last-child{margin-bottom:0}

table{width:100%;border-collapse:collapse}
th{font-family:var(--head);font-size:11px;font-weight:700;color:var(--muted);text-align:left;
  padding:0 14px 12px;text-transform:uppercase;letter-spacing:.06em}
td{padding:13px 14px;border-top:1px solid var(--line2);font-size:14px;vertical-align:middle}
/* Phone numbers, codes, counts — mono, so a column reads down cleanly. */
td.muted{font-family:var(--mono);font-size:13px}
tbody tr{cursor:pointer}
tbody tr:hover{background:var(--brand-wash)}
tr.flag{background:var(--bad-soft)}
tr.flag:hover{background:#FBDFDF}

.li{display:flex;align-items:center;gap:13px;padding:13px 0;border-top:1px solid var(--line2)}
.li:first-of-type{border-top:none}
.li .g,.gicon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0}
.li .g i,.gicon i{font-size:17px;color:#fff}

.svc{display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px}
.sv{border:1px solid var(--line);border-radius:10px;padding:14px 10px;text-align:center}
.sv.on{background:var(--brand);border-color:var(--brand)}
.sv .l{font-family:var(--head);font-size:12px;font-weight:600;color:var(--muted)}
.sv .v{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--ink);
  font-variant-numeric:tabular-nums;line-height:1.25}
.sv.on .l{color:#0A5540} .sv.on .v{color:#062B20}

.note{background:var(--brand-wash);border:1px solid var(--brand-soft);border-radius:10px;
  padding:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}

.mbg{position:fixed;inset:0;background:rgba(13,15,20,.6);display:flex;align-items:flex-start;
  justify-content:center;padding:40px 16px;overflow-y:auto;z-index:9}
.modal{background:#fff;border-radius:14px;padding:30px;width:100%;max-width:680px}
.sect{font-family:var(--head);font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.08em;
  text-transform:uppercase;margin:26px 0 14px;padding-bottom:8px;border-bottom:1px solid var(--line)}
.sect:first-of-type{margin-top:0}
.row{display:flex;justify-content:space-between;gap:16px;padding:9px 0;font-size:14px}
.row .k{color:var(--muted)}
.row .v{color:var(--ink);font-weight:600;text-align:right;font-family:var(--mono);
  font-size:13px;font-weight:500}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.gg2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.wrap{flex-direction:column}.side{width:100%;height:auto;position:static}
  .main{padding:20px}.g2,.g3,.gg2{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="login">
  <div class="box">
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">
      <div class="mark">H</div>
      <div><div class="h" style="font-size:20px;font-weight:600">Hispren</div>
        <div class="muted" style="font-size:12px">Church OS</div></div>
    </div>
    <div id="lerr"></div>
    <div class="field"><label>Church</label><input id="church" value="dominion" autocomplete="off"></div>
    <div class="field"><label>Email</label><input id="email" type="email" value="pastor@dominion.test" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="pw" type="password" value="DominionPastor2026" autocomplete="current-password"></div>
    <button class="btn" style="width:100%;margin-top:8px" onclick="doLogin()">Sign in</button>
  </div>
</div>

<div id="app"><div class="wrap">
  <div class="side">
    <div class="brand"><div class="mark">H</div><div class="t">Hispren</div></div>
    <div class="slab">Church</div>
    <div class="nav on" data-v="home"       onclick="go('home')"><i class="ti ti-layout-dashboard"></i>Overview</div>
    <div class="nav"    data-v="members"    onclick="go('members')"><i class="ti ti-users"></i>Members</div>
    <div class="nav"    data-v="attendance" onclick="go('attendance')"><i class="ti ti-qrcode"></i>Attendance</div>
    <div class="nav"    data-v="groups"     onclick="go('groups')"><i class="ti ti-sitemap"></i>Groups</div>
    <div class="nav"    data-v="calendar"   onclick="go('calendar')"><i class="ti ti-calendar"></i>Calendar</div>
    <div class="nav"    data-v="followups"  onclick="go('followups')"><i class="ti ti-phone-call"></i>Follow-ups<span id="tBadge"></span></div>
    <div class="nav"    data-v="care"       onclick="go('care')"><i class="ti ti-heart-handshake"></i>Pastoral care</div>
    <div class="nav"    data-v="messages"   onclick="go('messages')"><i class="ti ti-message-2"></i>Messages</div>
    <div class="nav"    data-v="reports"    onclick="go('reports')"><i class="ti ti-chart-line"></i>Reports</div>
    <div class="slab">Data</div>
    <div class="nav"    data-v="duplicates" onclick="go('duplicates')"><i class="ti ti-copy"></i>Duplicates<span id="dBadge"></span></div>
    <div class="nav"    data-v="import"     onclick="go('import')"><i class="ti ti-file-import"></i>Import</div>
    <div class="nav"    data-v="export"     onclick="go('export')"><i class="ti ti-download"></i>Export</div>
    <div class="nav"    data-v="settings"   onclick="go('settings')"><i class="ti ti-settings"></i>Settings</div>
    <div class="who">
      <div class="av" id="pAv">—</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:600;color:var(--ink);overflow:hidden;
          text-overflow:ellipsis;white-space:nowrap" id="pName">—</div>
        <div class="muted" style="font-size:12px;cursor:pointer" onclick="logout()">Sign out</div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="top">
      <div><h1 id="hTitle">Overview</h1><div class="sub" id="hSub">—</div></div>
      <div style="display:flex;gap:9px" id="hActs"></div>
    </div>
    <div id="view"></div>
  </div>
</div></div>
<div id="modal"></div>

<script>
let CHURCH='', ME=null, DUPES=[], MEMBERS=[], STAGES=[], GROUPS=[], STATES=[], FIELDS=[], USERS=[], TASKS=[];
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const ini=n=>(n||'?').split(' ').filter(Boolean).slice(0,2).map(x=>x[0]).join('').toUpperCase();
const GC=['#4338CA','#0891B2','#059669','#D97706'];
const GI=['building-church','users-group','microphone-2','home-2'];

async function api(p,o={}){
  const r=await fetch(p,{...o,headers:{'Content-Type':'application/json','X-Church':CHURCH,...(o.headers||{})},credentials:'include'});
  if(r.status===401){logout();throw new Error('signed out')}
  const b=await r.json().catch(()=>({}));
  if(!r.ok) throw new Error(b.detail||b.error||'request failed');
  return b;
}
async function doLogin(){
  CHURCH=$('#church').value.trim().toLowerCase(); $('#lerr').innerHTML='';
  try{
    await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:$('#email').value.trim(),password:$('#pw').value})});
    sessionStorage.setItem('church',CHURCH); await boot();
  }catch(e){ $('#lerr').innerHTML=`<div class="err">${esc(e.message)}</div>` }
}
function logout(){
  fetch('/api/auth/logout',{method:'POST',headers:{'X-Church':CHURCH},credentials:'include'}).catch(()=>{});
  sessionStorage.clear(); $('#app').style.display='none'; $('#login').style.display='flex';
}
async function boot(){
  ME=await api('/api/me');
  $('#login').style.display='none'; $('#app').style.display='block';
  $('#pName').textContent=ME.tenant.name; $('#pAv').textContent=ini(ME.tenant.name);
  MEMBERS=(await api('/api/members?limit=300')).members;
  DUPES=await api('/api/duplicates').catch(()=>[]);
  [STAGES,GROUPS,STATES,FIELDS,USERS,TASKS]=await Promise.all([
    api('/api/stages').catch(()=>[]),
    api('/api/groups').catch(()=>[]),
    api('/api/states').catch(()=>[]),
    api('/api/church/fields').catch(()=>[]),
    api('/api/users').catch(()=>[]),
    api('/api/tasks').catch(()=>[])]);
  const od=TASKS.filter(t=>t.overdue).length;
  $('#tBadge').outerHTML = od
    ? `<span class="n" id="tBadge">${od}</span>` : '<span id="tBadge"></span>';
  $('#dBadge').outerHTML=DUPES.length?`<span class="n" id="dBadge">${DUPES.length}</span>`:'<span id="dBadge"></span>';
  go('home');
}
function head(t,s,a=''){ $('#hTitle').textContent=t; $('#hSub').textContent=s; $('#hActs').innerHTML=a; }
function go(v){
  document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('on',n.dataset.v===v));
  ({home:viewHome,members:viewMembers,attendance:viewAtt,groups:viewGroups,calendar:viewCal,
    followups:viewTasks,care:viewCare,messages:viewMsgs,reports:viewReports,
    duplicates:viewDupes,import:viewImport,export:viewExport,settings:viewSettings})[v]();
}

/* ============================== OVERVIEW ============================== */
function viewHome(){
  const t=MEMBERS.length;
  const call=MEMBERS.filter(m=>['visitor','first_timer'].includes(m.stage_key));
  const noc=MEMBERS.filter(m=>!m.phone&&!m.phone_2&&!m.email).length;
  const reach=t?Math.round((t-noc)/t*100):0;
  const grouped=MEMBERS.filter(m=>m.home_group_name).length;
  const gp=t?Math.round(grouped/t*100):0;
  const svc=k=>MEMBERS.filter(m=>m.usual_service===k).length;
  const S=[svc('1st Service'),svc('2nd Service'),svc('3rd Service')];
  const top=Math.max(...S);
  const gs=[...new Set(MEMBERS.map(m=>m.home_group_name).filter(Boolean))];

  head('Overview', ME.tenant.name,
    `<button class="btn btn-o" onclick="visitorCard()">Visitor card</button>
     <button class="btn" onclick="openForm()">Register member</button>`);

  $('#view').innerHTML=`
  <div class="kpis">
    <div class="kpi acc"><div class="l">Members</div><div class="v">${t}</div>
      <div class="d muted">${grouped} in a group</div></div>
    <div class="kpi ${call.length?'warn':''}"><div class="l">Awaiting a call</div>
      <div class="v">${call.length}</div>
      <div class="d" style="color:${call.length?'var(--warn)':'var(--muted)'}">
        ${call.length?'First 72 hours decide':'Nobody waiting'}</div></div>
    <div class="kpi ${DUPES.length?'bad':''}"><div class="l">Duplicates</div>
      <div class="v">${DUPES.length}</div>
      <div class="d" style="color:${DUPES.length?'var(--bad)':'var(--muted)'}">
        ${DUPES.length?'Need review':'Clean'}</div></div>
    <div class="kpi"><div class="l">Reachable</div><div class="v">${reach}%</div>
      <div class="d muted">${noc} with no contact</div></div>
  </div>

  <div class="g2">
   <div class="col">
    <div class="card">
      <div class="ch"><i class="ti ti-phone-call"></i><h3>Follow-ups</h3>
        <span class="r">${TASKS.length} open</span></div>
      ${TASKS.slice(0,5).map(t=>`
        <div class="li" onclick="go('followups')" style="cursor:pointer">
          <div class="av">${ini(t.subject_name||t.title)}</div>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;color:var(--ink)">${esc(t.title)}</div>
            <div class="muted">${esc(t.owner||'unassigned')}${t.due_at
              ?' · due '+new Date(t.due_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):''}</div>
          </div>
          <span class="tag ${t.overdue?'t-r':'t-w'}">${t.overdue?'Overdue':'Open'}</span>
        </div>`).join('')||`<div class="muted">No open follow-ups.
          ${call.length?`<b style="color:var(--ink)">${call.length} first-timer${call.length===1?'':'s'}
          have nobody assigned</b> — <span style="color:var(--brand);cursor:pointer"
          onclick="genTasks()">create the tasks</span>.`:''}</div>`}
    </div>

    <div class="card">
      <div class="ch"><i class="ti ti-activity"></i><h3>Data health</h3></div>
      <div class="meter">
        <div style="display:flex;justify-content:space-between;margin-bottom:7px">
          <div><div style="font-weight:600;color:var(--ink);font-size:14px">Members we can reach</div>
            <div class="muted">${t-noc} of ${t} have a phone or email</div></div>
          <div class="num" style="font-size:18px">${reach}%</div></div>
        <div class="bar"><div style="width:${reach}%;background:${reach>80?'var(--good)':'var(--warn)'}"></div></div>
      </div>
      <div class="meter">
        <div style="display:flex;justify-content:space-between;margin-bottom:7px">
          <div><div style="font-weight:600;color:var(--ink);font-size:14px">In a cell or department</div>
            <div class="muted">${grouped} of ${t} — nobody should be invisible</div></div>
          <div class="num" style="font-size:18px">${gp}%</div></div>
        <div class="bar"><div style="width:${gp}%;background:${gp>70?'var(--good)':'var(--warn)'}"></div></div>
      </div>
    </div>
   </div>

   <div class="col">
    <div class="card">
      <div class="ch"><i class="ti ti-building-church"></i><h3>By service</h3>
        <span class="r">${t} members</span></div>
      <div class="svc">
        ${['1st','2nd','3rd'].map((l,i)=>`<div class="sv ${top&&S[i]===top?'on':''}">
          <div class="l">${l}</div><div class="v">${S[i]}</div></div>`).join('')}
      </div>
      <div class="muted" style="margin-top:14px">
        A single attendance number hides which service is growing.</div>
    </div>

    <div class="card">
      <div class="ch"><i class="ti ti-layout-grid"></i><h3>Groups</h3>
        <span class="r">${gs.length}</span></div>

/* Tick several members, message exactly them. */
let SEL=new Set();
function toggleSel(id,on){
  on ? SEL.add(id) : SEL.delete(id);
  const b=$('#msgSel');
  b.style.display = SEL.size ? '' : 'none';
  b.textContent = `Message ${SEL.size}`;
}
function selectAll(el){
  SEL = new Set();
  document.querySelectorAll('.rowsel').forEach(c=>{
    c.checked = el.checked;
    if(el.checked) SEL.add(c.value);
  });
  const b=$('#msgSel');
  b.style.display = SEL.size ? '' : 'none';
  b.textContent = `Message ${SEL.size}`;
}
function messageSelected(){
  if(!SEL.size) return;
  messageThese([...SEL], `${SEL.size} selected member${SEL.size===1?'':'s'}`);
}

async function saveEdit(id){
  const ks=['first_name','middle_name','last_name','phone','phone_2','email',
    'state_of_origin','lga_of_origin','address','town','lga','gender','date_of_birth',
    'marital_status','occupation','workplace','journey_stage_id','home_group_id',
    'usual_service','post_held'];
  const b={};
  // Send every field, including blanks — clearing a wrong phone number must
  // actually clear it, not silently keep the old value.
  ks.forEach(k=>{ const el=$('#e_'+k); if(el) b[k]=el.value.trim()||null; });

  // custom fields — the church's own denomination-specific questions
  if(FIELDS.length){
    const c={};
    FIELDS.forEach(fd=>{
      const el=$('#c_'+fd.key); if(!el) return;
      const v=el.value.trim();
      if(v==='') return;
      c[fd.key] = fd.field_type==='boolean' ? (v==='true')
                : fd.field_type==='number'  ? Number(v) : v;
    });
    b.custom=c;
  }
  if(!b.first_name){$('#eerr').innerHTML='<div class="err">A first name is required.</div>';return}
  try{
    await api('/api/members/'+id,{method:'PATCH',body:JSON.stringify(b)});
    await boot(); go('members'); openMember(id);
  }catch(e){ $('#eerr').innerHTML=`<div class="err">${esc(e.message)}</div>` }
}

async function openSheet(){
  const sel=$('#svcPick'); if(!sel||!sel.value) return;
  const s=await api('/api/attendance/session',{method:'POST',
    body:JSON.stringify({service_id:sel.value})});
  loadSheet(s.id, sel.selectedOptions[0].textContent, s.session_date);
}

async function loadSheet(id,name,date,q=''){
  SESS={id,name,date};
  const [sheet,state]=await Promise.all([
    api(`/api/attendance/session/${id}/sheet`+(q?'?q='+encodeURIComponent(q):'')),
    api(`/api/attendance/session/${id}`)]);
  const present=sheet.filter(x=>x.present).length;

  head('Mark sheet', `${name} · ${new Date(date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})}`,
    `<button class="btn btn-o" onclick="go('attendance')">Back</button>
     <a href="/scan.html?church=${encodeURIComponent(CHURCH)}" target="_blank" class="btn"
        style="text-decoration:none">Scanner</a>`);

  $('#view').innerHTML=`
   <div class="kpis">
     <div class="kpi acc"><div class="l">Marked present</div><div class="v" id="nP">${present}</div>
       <div class="d muted">of ${sheet.length} on the roll</div></div>
     <div class="kpi"><div class="l">First timers</div><div class="v">${state.first_timers||0}</div>
       <div class="d muted">Present today</div></div>
     <div class="kpi warn"><div class="l">Unregistered</div>
       <div class="v"><input id="unreg" type="number" min="0" value="${state.unregistered_count||0}"
         style="width:88px;font-family:var(--head);font-size:26px;font-weight:500;padding:2px 6px;
                border:1px solid var(--line);text-align:center"
         onchange="setUnreg(this.value)"></div>
       <div class="d muted">Headcount, not on the roll</div></div>
     <div class="kpi"><div class="l">Total in the building</div>
       <div class="v" id="nT">${present+(state.unregistered_count||0)}</div>
       <div class="d muted">Marked + headcount</div></div>
   </div>

   <div class="card">
     <div style="margin-bottom:18px">
       <input id="sq" value="${esc(q)}" placeholder="Search a name, phone, or member code"></div>
     <table><thead><tr>
       <th style="width:70px">Present</th><th>Member</th><th>Group</th><th>Service</th><th>How</th>
     </tr></thead><tbody>
     ${sheet.map(x=>`<tr id="r_${x.id}" class="${x.present?'':''}"
        style="${x.present?'background:var(--good-soft)':''}">
       <td onclick="toggle('${x.id}',${x.present})" style="cursor:pointer">
         <div style="width:26px;height:26px;border-radius:6px;display:flex;align-items:center;
              justify-content:center;border:2px solid ${x.present?'var(--good)':'var(--line)'};
              background:${x.present?'var(--good)':'#fff'}">
           ${x.present?'<i class="ti ti-check" style="color:#fff;font-size:16px"></i>':''}
         </div></td>
       <td onclick="toggle('${x.id}',${x.present})" style="cursor:pointer">
         <div style="display:flex;align-items:center;gap:12px">
           <div class="av">${ini(x.name)}</div>
           <div><div style="font-weight:600;color:var(--ink)">${esc(x.name)}</div>
             <div class="muted" style="font-size:12px">${esc(x.phone||'no phone')} · ${esc(x.stage_label||'')}</div>
           </div></div></td>
       <td class="muted">${esc(x.group_name||'—')}</td>
       <td class="muted">${esc((x.usual_service||'—').replace(' Service',''))}</td>
       <td>${x.present?`<span class="tag ${x.method==='qr'?'t-b':'t-n'}">${x.method==='qr'?'scanned':'by hand'}</span>`:''}</td>
     </tr>`).join('')||'<tr><td colspan="5" class="muted">Nobody found.</td></tr>'}
     </tbody></table>
   </div>`;

  const b=$('#sq');
  b.oninput=e=>{clearTimeout(window._t);
    window._t=setTimeout(()=>loadSheet(id,name,date,e.target.value),300)};
  b.focus(); b.setSelectionRange(b.value.length,b.value.length);
}

async function toggle(personId,isPresent){
  const row=$('#r_'+personId);
  if(isPresent){
    await api(`/api/attendance/session/${SESS.id}/mark/${personId}`,{method:'DELETE'});
  }else{
    await api(`/api/attendance/session/${SESS.id}/mark`,{method:'POST',
      body:JSON.stringify({person_id:personId})});
  }
  loadSheet(SESS.id,SESS.name,SESS.date,$('#sq')?$('#sq').value:'');
}
async function setUnreg(n){
  await api(`/api/attendance/session/${SESS.id}/unregistered`,{method:'PUT',
    body:JSON.stringify({count:Number(n)||0})});
  const p=Number($('#nP').textContent)||0;
  $('#nT').textContent=p+(Number(n)||0);
}

async function mg(keep,drop){
  if(!confirm('Merge these records? The other one is archived — but kept in full in the merge log, forever.'))return;
  await api('/api/duplicates/merge',{method:'POST',body:JSON.stringify({keep_id:keep,merge_id:drop})});
  await boot(); go('duplicates');
}
async function dis(id){await api(`/api/duplicates/${id}/dismiss`,{method:'POST'});await boot();go('duplicates')}

function viewImport(){
  head('Import','Bring a spreadsheet in');
  $('#view').innerHTML=`<div class="card">
    <div class="muted" style="line-height:1.8;margin-bottom:20px">
      Upload a CSV. Columns are matched for you, phone numbers cleaned, and dates read in
      Nigerian order. Nothing is written until you confirm — and any import can be undone.</div>

      style="border:1px dashed var(--line);padding:28px;border-radius:10px;background:var(--brand-wash)">
    <div id="pv" style="margin-top:22px"></div></div>`;
  $('#csv').onchange=async e=>{
    const file=e.target.files[0]; if(!file)return;
    const csv=await file.text(); $('#pv').innerHTML='<div class="muted">Reading…</div>';
    try{
      const p=await api('/api/import/preview',{method:'POST',body:JSON.stringify({filename:file.name,csv})});
      window._i={csv,...p};
      $('#pv').innerHTML=`
        <div class="kpis" style="margin-bottom:20px">
          <div class="kpi"><div class="l">Rows</div><div class="v">${p.total}</div></div>
          <div class="kpi acc"><div class="l">Valid</div><div class="v">${p.valid}</div></div>
          <div class="kpi ${p.errors?'bad':''}"><div class="l">Problems</div><div class="v">${p.errors}</div></div>
        </div>
        <div class="sect">Columns matched</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">
          ${Object.entries(p.column_map).map(([h,f])=>`<span class="tag t-b">${esc(h)} → ${esc(f)}</span>`).join('')}</div>
        ${p.unmapped_columns.length?`<div class="sect">Ignored</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px">
            ${p.unmapped_columns.map(c=>`<span class="tag t-n">${esc(c)}</span>`).join('')}</div>`:''}
        ${p.preview.filter(r=>r.warnings.length||r.errors.length).slice(0,8)
          .map(r=>`<div class="muted" style="margin-bottom:5px">Row ${r.row}: ${esc([...r.errors,...r.warnings].join(' · '))}</div>`).join('')}
        <button class="btn" style="width:100%;margin-top:20px" onclick="commit()">
          Import ${p.valid} member${p.valid===1?'':'s'}</button>`;
    }catch(err){$('#pv').innerHTML=`<div class="err">${esc(err.message)}</div>`}
  };
}
async function commit(){
  const i=window._i;
  const r=await api('/api/import/commit',{method:'POST',
    body:JSON.stringify({batch_id:i.batch_id,csv:i.csv,column_map:i.column_map})});
  alert(`Imported ${r.imported}. Skipped ${r.skipped}.`);
  await boot(); go('members');
}

/* ============================== CALENDAR ============================= */
const KINDS=['sunday','midweek','cell','prayer','vigil','special','crusade',
             'conference','convention','wedding','burial','dedication','training'];
const DAYNAMES=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

async function viewCal(){
  const cal=await api('/api/church/calendar');
  const recurring=cal.filter(c=>!c.event_date);
  const events=cal.filter(c=>c.event_date);
  head('Calendar', `${recurring.length} recurring · ${events.length} upcoming`,
    `<button class="btn" onclick="editService()">Add to calendar</button>`);
  const card=(c)=>`<div class="li" onclick="editService('${c.id}')" style="cursor:pointer">
      <div class="g" style="background:${esc(c.colour)}">
        <i class="ti ti-${c.event_date?'confetti':'building-church'}"></i></div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;color:var(--ink)">${esc(c.name)}</div>
        <div class="muted">
          ${c.event_date
            ? new Date(c.event_date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})
            : DAYNAMES[c.day_of_week]+'s'}
          ${c.start_time?' · '+String(c.start_time).slice(0,5):''}
          ${c.end_time?'–'+String(c.end_time).slice(0,5):''}
          ${c.location?' · '+esc(c.location):''}
        </div></div>
      ${c.sessions_held?`<span class="muted">${c.sessions_held} held</span>`:''}
      <span class="tag t-n">${esc(c.kind)}</span>

    </div>`;
  $('#view').innerHTML=`
   <div class="card" style="margin-bottom:16px">
     <div class="ch"><i class="ti ti-repeat"></i><h3>Every week</h3>
       <span class="r">${recurring.length}</span></div>
     ${recurring.map(card).join('')||'<div class="muted">No recurring services.</div>'}
   </div>
   <div class="card">
     <div class="ch"><i class="ti ti-confetti"></i><h3>One-off events</h3>
       <span class="r">${events.length}</span></div>
     <div class="muted" style="margin-bottom:14px;line-height:1.7">
       Crusades, conventions, weddings, burials. They take attendance exactly the same way —
       open the scanner or the mark sheet.</div>

      <button class="btn" style="flex:2" onclick="saveService(${id?`'${id}'`:'null'})">Save</button>

function calMode(){
  const one=$('#c_mode').value==='oneoff';
  $('#c_dayF').style.display  = one?'none':'';
  $('#c_dateF').style.display = one?'':'none';
}
function calKind(){
  // a crusade or a wedding is obviously a one-off — pre-select it for them
  const k=$('#c_kind').value;
  if(['special','crusade','conference','convention','wedding','burial','dedication','training'].includes(k)){
    $('#c_mode').value='oneoff'; calMode();
  }
}
async function saveService(id){
  const one=$('#c_mode').value==='oneoff';
  const b={ name:$('#c_name').value.trim(), kind:$('#c_kind').value,
    day_of_week: one?null:Number($('#c_day').value),
    event_date:  one?($('#c_date').value||null):null,
    start_time:$('#c_start').value||null, end_time:$('#c_end').value||null,
    location:$('#c_loc').value.trim()||null,
    expected:$('#c_exp').value?Number($('#c_exp').value):null,
    colour:$('#c_colour').value };
  if(!b.name){$('#cerr').innerHTML='<div class="err">A name is required.</div>';return}
  if(one&&!b.event_date){$('#cerr').innerHTML='<div class="err">A one-off event needs a date.</div>';return}
  try{
    if(id) await api('/api/church/calendar/'+id,{method:'PATCH',body:JSON.stringify(b)});

async function delService(id,name){
  if(!confirm(`Archive "${name}"?\n\nAttendance already recorded against it is kept.`))return;
  await api('/api/church/calendar/'+id,{method:'DELETE'});
  close_(); go('calendar');
}

async function viewReports(){
  const [trend,growth,funnel,risk]=await Promise.all([
    api('/api/reports/trend?weeks=12').catch(()=>[]),
    api('/api/reports/growth?months=6').catch(()=>[]),
    api('/api/reports/funnel').catch(()=>[]),
    api('/api/reports/at-risk?weeks=3').catch(()=>[])]);
  head('Reports','The four questions a pastor actually asks');

  const byDate={};
  trend.forEach(t=>{ byDate[t.session_date]=(byDate[t.session_date]||0)+t.present; });
  const dates=Object.keys(byDate).sort();
  const peak=Math.max(1,...Object.values(byDate));
  const total=funnel.reduce((a,f)=>a+f.people,0);

  $('#view').innerHTML=`
   <div class="g2" style="margin-bottom:16px">
     <div class="card">
       <div class="ch"><i class="ti ti-chart-line"></i><h3>Attendance, last 12 weeks</h3></div>
       ${dates.length?`<div style="display:flex;align-items:flex-end;gap:5px;height:150px">
         ${dates.map(d=>`<div style="flex:1;display:flex;flex-direction:column;
              justify-content:flex-end;align-items:center;gap:5px" title="${d}: ${byDate[d]}">
           <div class="num" style="font-size:11px;color:var(--muted)">${byDate[d]}</div>
           <div style="width:100%;background:var(--brand);border-radius:4px 4px 0 0;
                height:${Math.max(4,byDate[d]/peak*110)}px"></div>
           <div style="font-size:10px;color:var(--faint)">
             ${new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</div>
         </div>`).join('')}</div>`
       :'<div class="muted">No attendance recorded yet. Open a service and mark someone present.</div>'}
     </div>

     <div class="card">
       <div class="ch"><i class="ti ti-filter"></i><h3>The funnel</h3>
         <span class="r">${total} people</span></div>
       ${funnel.map(f=>{const pct=total?Math.round(f.people/total*100):0;
         return `<div class="meter">
           <div style="display:flex;justify-content:space-between;margin-bottom:6px">
             <span style="font-weight:600;color:var(--ink);font-size:13px">${esc(f.label)}</span>
             <span class="num">${f.people}</span></div>
           <div class="bar"><div style="width:${pct}%;background:var(--brand)"></div></div>
         </div>`;}).join('')}
       <div class="muted" style="margin-top:12px;line-height:1.7">
         Where people pile up is where your process is broken.</div>
     </div>
   </div>

   <div class="g2">
     <div class="card">
       <div class="ch"><i class="ti ti-alert-triangle" style="color:var(--warn)"></i>
         <h3>At risk</h3>
         ${risk.length?`<button class="btn" style="margin-left:auto;padding:7px 14px;font-size:13px"
           onclick="messageThese(${JSON.stringify(risk.map(r=>r.id))},'${risk.length} drifting away')">
           Reach all ${risk.length}</button>`:'<span class="r">0</span>'}</div>
       <div class="muted" style="margin-bottom:14px;line-height:1.7">
         They came, then stopped. A visitor who never returned is not at risk — they were never
         yours. <b style="color:var(--ink)">These are people you had, and are losing.</b></div>
       ${risk.slice(0,8).map(r=>`<div class="li">
         <div class="av" onclick="openMember('${r.id}')" style="cursor:pointer">${ini(r.name)}</div>
         <div style="flex:1;min-width:0;cursor:pointer" onclick="openMember('${r.id}')">
           <div style="font-weight:600;color:var(--ink)">${esc(r.name)}</div>
           <div class="muted">${esc(r.group_name||'no group')}</div></div>
         <span class="tag ${r.weeks_away>=6?'t-r':'t-w'}">${r.weeks_away}w</span>
         ${r.phone?`<a href="tel:${esc(r.phone)}" onclick="event.stopPropagation()" title="Call"
           style="color:var(--brand-dk);padding:6px"><i class="ti ti-phone" style="font-size:19px"></i></a>`:''}
         <i class="ti ti-message-2" title="Message" style="font-size:19px;color:var(--brand-dk);cursor:pointer;padding:6px"
            onclick="event.stopPropagation();messageThese(['${r.id}'],'${esc(r.name)}')"></i>
       </div>`).join('')||'<div class="muted">Nobody has drifted. Rare, and good.</div>'}
     </div>

     <div class="card">
       <div class="ch"><i class="ti ti-user-plus"></i><h3>New registrations</h3></div>
       ${growth.length?growth.map(g=>{
         const peakG=Math.max(1,...growth.map(x=>x.registered));
         return `<div class="meter">
           <div style="display:flex;justify-content:space-between;margin-bottom:6px">
             <span style="font-weight:600;color:var(--ink);font-size:13px">
               ${new Date(g.month).toLocaleDateString('en-GB',{month:'long',year:'numeric'})}</span>
             <span class="num">${g.registered}</span></div>
           <div class="bar"><div style="width:${g.registered/peakG*100}%;background:var(--good)"></div></div>
         </div>`;}).join('')
       :'<div class="muted">No registrations yet.</div>'}
     </div>
   </div>`;
}

    </div></td>
    <td class="muted">${esc(t.owner||'unassigned')}</td>
    <td><span class="tag t-n">${esc(t.kind.replace('_',' '))}</span></td>
    <td>${t.due_at?`<span class="${t.overdue?'tag t-r':'muted'}">${

async function genTasks(){

async function saveTask(id){
  const b={ title:$('#t_title').value.trim(), detail:$('#t_detail').value.trim()||null,
    assigned_to_user:$('#t_user').value||null,
    due_at:$('#t_due').value?$('#t_due').value+'T09:00:00Z':null,
    kind:'follow_up' };
  const sub=$('#t_subj').value;
  if(sub){ b.subject_type='person'; b.subject_id=sub; }
  if(!b.title){$('#terr').innerHTML='<div class="err">A title is required.</div>';return}
  try{
    if(id) await api('/api/tasks/'+id,{method:'PATCH',body:JSON.stringify(b)});
    else    await api('/api/tasks',{method:'POST',body:JSON.stringify(b)});
    close_(); await boot(); go('followups');
  }catch(e){ $('#terr').innerHTML=`<div class="err">${esc(e.message)}</div>` }
}

async function addSeg(){
  const n=$('#sg_n').value.trim(); if(!n) return;
  await api('/api/notify/segments',{method:'POST',
    body:JSON.stringify({name:n, filter:JSON.parse($('#sg_f').value)})});
  go('messages');
}
async function topup(){
  const n=prompt('How many SMS credits?','1000'); if(!n) return;
  await api('/api/notify/wallet/topup',{method:'POST',
    body:JSON.stringify({credit_type:'sms', amount:Number(n)})});
  go('messages');
}

async function compose(segId,tplId){
  const [segs,tpls]=await Promise.all([
    api('/api/notify/segments'), api('/api/notify/templates')]);
  const tpl = tplId ? tpls.find(t=>t.id===tplId) : null;
  $('#modal').innerHTML=`<div class="mbg" onclick="if(event.target===this)close_()"><div class="modal">
    <div class="h" style="font-size:22px;font-weight:500">Compose</div>
    <div class="muted" style="margin-bottom:22px">
      Nothing is sent until you press send — and you will see exactly who is being held back,
      and why, before you do.</div>
    <div id="merr"></div>
    <div class="gg2">
      <div class="field"><label>Send to</label><select id="m_seg">
        ${segs.map(s=>`<option value="${s.id}" ${s.id===segId?'selected':''}>${esc(s.name)} (${s.people})</option>`).join('')}
      </select></div>
      <div class="field"><label>Template</label><select id="m_tpl" onchange="useTpl()">
        <option value="">— write it myself —</option>
        ${tpls.map(t=>`<option value="${t.id}" ${t.id===tplId?'selected':''}
          data-body="${esc(t.body)}">${esc(t.name)}</option>`).join('')}
      </select></div>
    </div>
    <div class="field"><label>Message</label>
      <textarea id="m_body" rows="5" oninput="cnt()" style="font-family:var(--text);font-size:14px;
        padding:12px;border:1px solid var(--line);border-radius:8px;width:100%;resize:vertical"
      >${esc(tpl?tpl.body:'')}</textarea>
    </div>
    <div id="m_cnt"></div>
    <div class="muted" style="margin-top:10px;line-height:1.7">
      <b style="color:var(--ink)">{{first_name}}</b> · <b style="color:var(--ink)">{{church}}</b>
      · <b style="color:var(--ink)">{{service}}</b> are filled in per person.</div>
    <div id="m_prev"></div>
    <div style="display:flex;gap:12px;margin-top:24px">
      <button class="btn btn-o" style="flex:1" onclick="close_()">Cancel</button>
      <button class="btn" style="flex:2" onclick="doCompose()">Check before sending</button>
    </div>
  </div></div>`;
  cnt();
}
function useTpl(){
  const o=$('#m_tpl').selectedOptions[0];
  if(o&&o.dataset.body){ $('#m_body').value=o.dataset.body; cnt(); }
}
async function cnt(){
  const body=$('#m_body').value;
  if(!body){ $('#m_cnt').innerHTML=''; return; }
  const c=await api('/api/notify/count',{method:'POST',body:JSON.stringify({body})});
  const bad=c.encoding==='UCS-2';
  $('#m_cnt').innerHTML=`
    <div style="background:${bad?'var(--warn-soft)':'var(--good-soft)'};border-radius:9px;
         padding:13px 15px;display:flex;align-items:center;gap:14px">
      <i class="ti ti-${bad?'alert-triangle':'circle-check'}"
         style="font-size:22px;color:${bad?'var(--warn)':'var(--good)'}"></i>
      <div style="flex:1">
        <div style="font-weight:600;color:${bad?'var(--warn)':'var(--good)'}">
          ${c.chars} characters · ${c.encoding} · <b>${c.units} SMS per person</b></div>
        ${bad?`<div style="font-size:12px;color:var(--warn);line-height:1.6;margin-top:3px">
          Broken by <b>${c.offenders.map(esc).join(' ')}</b> — these force 70 characters per SMS
          instead of 160. <b>This message costs ${c.units}× what it should.</b>
          A curly quote pasted from Word is usually the culprit.</div>`
        :`<div style="font-size:12px;color:var(--good)">Fits the cheap encoding.</div>`}
      </div>
    </div>`;
}
async function doCompose(){
  const body=$('#m_body').value.trim();
  if(!body){$('#merr').innerHTML='<div class="err">Write something.</div>';return}
  try{
    const r=await api('/api/notify/compose',{method:'POST',
      body:JSON.stringify({channel:'sms', body, segment_id:$('#m_seg').value})});
    const B=r.breakdown||{};
    const why={consent:'no consent',deceased:'deceased',frequency_cap:'already had 3 this week',
      quiet_hours:'quiet hours',no_number:'no phone number',bounced:'number bounced'};
    $('#m_prev').innerHTML=`
      <div class="kpis" style="margin-top:18px">
        <div class="kpi acc"><div class="l">Will send</div><div class="v">${r.sendable}</div></div>
        <div class="kpi ${r.suppressed?'warn':''}"><div class="l">Held back</div>
          <div class="v">${r.suppressed}</div></div>
        <div class="kpi"><div class="l">Cost</div>
          <div class="v" style="font-size:22px;padding-top:6px">₦${Number(r.cost).toLocaleString()}</div></div>
      </div>
      ${r.suppressed?`<div class="sect">Why ${r.suppressed} will not receive it</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${Object.entries(B).map(([k,v])=>`<span class="tag t-w">${v} — ${why[k]||k}</span>`).join('')}
        </div>`:''}
      <button class="btn" style="width:100%;margin-top:20px"
        onclick="doSend('${r.message.id}',${r.sendable})">
        Send to ${r.sendable} ${r.sendable===1?'person':'people'} · ₦${Number(r.cost).toLocaleString()}</button>`;
  }catch(e){ $('#merr').innerHTML=`<div class="err">${esc(e.message)}</div>` }
}
async function doSend(id,n){
  if(!confirm(`Send to ${n} people?`))return;
  try{
    await api('/api/notify/send/'+id,{method:'POST'});
    close_(); go('messages');
  }catch(e){
    $('#merr').innerHTML=`<div class="err">${esc(e.message)}</div>`;
  }
}

/**
 * Open the composer, scoped to specific people.
 *
 * Every screen that shows a PROBLEM must offer the ACTION. A list of 58 members
 * drifting away, with no way to reach them, is not a feature — it is a rebuke.
 */
function messageThese(ids, label){
  window._scope = { ids, label };
  compose();
}
function messageAll(){
  window._scope = null;
  compose();
}

/** Click to call. On a phone this dials; on a desktop it does nothing bad. */
function telLink(p){
  if(!p) return '<span class="muted">—</span>';
  return `<a href="tel:${esc(p)}" onclick="event.stopPropagation()"
    style="color:var(--brand-dk);text-decoration:none;font-family:var(--mono);font-size:13px">
    ${esc(p)}</a>`;
}
function mailLink(e){
  if(!e) return '';
  return `<a href="mailto:${esc(e)}" onclick="event.stopPropagation()"
    style="color:var(--brand-dk);text-decoration:none">${esc(e)}</a>`;
}

  $('#modal').innerHTML=`<div class="mbg" onclick="if(event.target===this)close_()"><div class="modal">
    <div class="h" style="font-size:22px;font-weight:500">
      ${sc ? 'Message '+esc(sc.label) : 'Message everyone'}</div>
    <div class="muted" style="margin-bottom:24px;line-height:1.75">
      ${sc ? `<b style="color:var(--ink)">${sc.ids.length}</b> ${sc.ids.length===1?'person':'people'}. `
           : 'The whole congregation. '}
      Nothing is sent until you see exactly who it reaches — and who it does not.</div>
    <div id="merr"></div>
    <div class="field"><label>Name this campaign</label>
      <input id="m_name" placeholder="Sunday reminder"></div>

    <div class="field"><label>How to send it</label>
      <select id="m_ch" onchange="chanChange()">
        <option value="cascade" selected>Email where possible, SMS for the rest — cheapest</option>
        <option value="email">Email only — free</option>
        <option value="sms">SMS only — everyone gets a text</option>
      </select>
      <div class="muted" style="margin-top:7px;line-height:1.65" id="m_chnote">

        Only the ones without pay for an SMS.</div>
    </div>

    <div class="field" id="m_subjF" style="display:none">
      <label>Subject</label><input id="m_subj" placeholder="A word from your church"></div>

    <div class="field"><label>Start from a template</label>
      <select id="m_t" onchange="useTemplate()">
        <option value="">— write my own —</option>
        ${T.map(t=>`<option value="${t.id}" data-ch="${t.channel}">${esc(t.name)} (${t.channel})</option>`).join('')}
      </select></div>
    <div class="field"><label>Message</label>
      <textarea id="m_body" rows="4" oninput="recount()"
        style="font-family:var(--text);font-size:14px;padding:12px;border:1px solid var(--line);
               border-radius:8px;width:100%;resize:vertical"
        placeholder="Hello {{first_name}}, ..."></textarea>
      <div class="muted" style="margin-top:6px;line-height:1.7">
        Merge fields: <b style="color:var(--ink)">{{first_name}}</b>
        <b style="color:var(--ink)">{{church}}</b><br>

      <button class="btn" style="flex:2" onclick="doPrepare()">See who this reaches</button>
    </div>
  </div></div>`;
}

function chanChange(){
  const c=$('#m_ch').value;
  const email = c!=='sms';
  $('#m_subjF').style.display = (c==='email'||c==='cascade') ? '' : 'none';
  $('#m_chnote').innerHTML =
    c==='email' ? 'Free. No character limit, no DND register, no time window. '
                + 'Members without an email address get nothing — check the numbers above.'
  : c==='sms'  ? 'Every member with a phone gets a text. This is the expensive option, '
                + 'and DND-registered numbers may not be reached at all.'
  : 'Members with an email address get an email, which costs nothing. '
    + 'Only the ones without pay for an SMS.';
  recount();
}

function useTemplate(){
  const opt=$('#m_t').selectedOptions[0];
  const t=(window._T||[]).find(x=>x.id===$('#m_t').value);
  if(!t) return;
  $('#m_body').value=t.body;
  if(!$('#m_name').value) $('#m_name').value=t.name;
  if(t.subject) $('#m_subj').value=t.subject;
  // an email template in an SMS campaign is 900 characters of pain
  if(t.channel==='email'&&$('#m_ch').value==='sms'){ $('#m_ch').value='cascade'; }
  chanChange();
}

async function recount(){
  const body=$('#m_body').value;
  const chEl=$('#m_ch');
  if(!body){ $('#m_count').innerHTML=''; return; }

  // Email has no page count and no cost. Counting characters would be a lie
  // that pushes a pastor to write less than he means to.
  if(chEl && chEl.value==='email'){
    $('#m_count').innerHTML=`<div style="background:var(--brand-wash);
      border:1px solid var(--brand-soft);border-radius:9px;padding:14px;
      display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-weight:600;color:var(--ink);font-size:13px">Email</div>
        <div class="muted">No character limit. Write what you mean.</div></div>
      <div class="num" style="font-size:22px;color:var(--brand-dk)">Free</div></div>`;
    return;
  }

  const c=await api('/api/notify/count',{method:'POST',body:JSON.stringify({body})});
  const r=c.raw, n=c.normalised;
  const overpaying = r.units > n.units;
  $('#m_count').innerHTML=`
    <div style="background:${overpaying?'var(--bad-soft)':'var(--brand-wash)'};
         border:1px solid ${overpaying?'var(--bad)':'var(--brand-soft)'};
         border-radius:9px;padding:14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="font-weight:600;color:var(--ink);font-size:13px">
            ${r.encoding} · ${r.chars} characters</div>
          <div class="muted">${r.remaining} left in this page</div>
        </div>
        <div class="num" style="font-size:24px;color:${overpaying?'var(--bad)':'var(--ink)'}">
          ${r.units} page${r.units===1?'':'s'}</div>
      </div>
      ${overpaying?`<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--bad-soft);
        font-size:13px;line-height:1.75;color:var(--bad)">
        <b>You are paying ${r.units}x.</b> These characters are not in the SMS alphabet:
        <b>${r.offenders.map(o=>esc(o)).join(' ')}</b> — almost certainly pasted from Word.
        One curly apostrophe turns a 160-character message into a 70-character one.
        <button class="btn" style="background:var(--bad);margin-top:10px"
          onclick="fixText()">Fix it — back to ${n.units} page${n.units===1?'':'s'}</button>
      </div>`:''}
    </div>`;
}

async function fixText(){
  const c=await api('/api/notify/count',{method:'POST',
    body:JSON.stringify({body:$('#m_body').value})});
  $('#m_body').value=c.fixed;
  recount();
}

async function doPrepare(){
  const name=$('#m_name').value.trim()||'Campaign';
  const body=$('#m_body').value.trim();
  if(!body){$('#merr').innerHTML='<div class="err">Write something first.</div>';return}
  try{
    const sc = window._scope;
    PREP=await api('/api/notify/prepare',{method:'POST',
      body:JSON.stringify({name, body,
        channel: $('#m_ch') ? $('#m_ch').value : 'cascade',
        subject: $('#m_subj') ? $('#m_subj').value.trim() : undefined,
        person_ids: sc ? sc.ids : undefined,
        template_id:$('#m_t').value||undefined})});
    showPrepare();
  }catch(e){ $('#merr').innerHTML=`<div class="err">${esc(e.message)}</div>` }
}

    <tbody>${msgs.map(m=>`<tr>
      <td style="font-weight:600;color:var(--ink)">${esc(m.name||'—')}</td>
      <td class="muted">${esc(m.to_address)}</td>
      <td><span class="tag ${m.channel==='email'?'t-g':'t-b'}">${esc(m.channel||'sms')}</span></td>
      <td><span class="tag ${m.status==='suppressed'?'t-r':
        m.status==='failed'?'t-r':m.status==='sent'?'t-g':'t-n'}">${esc(m.status)}</span></td>
      <td class="muted" style="font-size:12px">${
        m.suppressed_by ? esc((SUPPRESS_REASON[m.suppressed_by]||[m.suppressed_by])[0])
        : m.error ? esc(m.error)
        : m.route ? esc(m.route)+' route' : '—'}</td>
    </tr>`).join('')}</tbody></table>
    <button class="btn btn-o" style="width:100%;margin-top:24px" onclick="close_()">Close</button>
  </div></div>`;
}

(async()=>{
  const s=sessionStorage.getItem('church');
  if(s){CHURCH=s;try{await boot();return}catch(e){}}
  $('#login').style.display='flex';
})();
</script>
</body>
</html>
